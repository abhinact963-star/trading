<style>
:root{--bg:#0A0E14;--surface:#11161F;--surface-2:#171F2C;--border:#232C3D;

.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--bull);margin:0 0 12px;}
h1.title{font-family:var(--mono);font-weight:700;font-size:clamp(32px,5vw,54px);line-height:1.05;margin:0 0 16px;}

.btn:hover{border-color:var(--amber);}.btn.primary{background:var(--amber);color:#0A0E14;border-color:var(--amber);}
.pips-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 22px;}

.qp:hover{border-color:var(--text-dim);}.qp.ok{border-color:var(--bull);background:rgba(52,214,196,.08);}.qp.no{border-color:var(--bear);background:rgba(255,107,129,.08);}
.qp:disabled{cursor:default;}.qe{font-size:12px;color:var(--text-dim);margin-top:6px;display:none;}.qe.show{display:block;}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

<script>
const S={cur:null,pts:0,done:new Set()};
try{const d=JSON.parse(localStorage.getItem('rtt2'));if(d){S.pts=d.p||0;(d.d||[]).forEach(x=>S.done.add(x));}}catch(e){}
function save(){localStorage.setItem('rtt2',JSON.stringify({p:S.pts,d:[...S.done]}));}
function mc(el,w,h){const c=document.createElement('canvas');c.width=w*2;c.height=h*2;c.style.width='100%';c.style.maxWidth=w+'px';c.style.height='auto';c.style.display='block';c.style.borderRadius='6px';const x=c.getContext('2d');x.scale(2,2);el.appendChild(c);
x.fillStyle='#080C12';x.fillRect(0,0,w,h);
x.strokeStyle='rgba(35,44,61,.5)';x.lineWidth=0.5;
for(let i=0;i<w;i+=50){x.beginPath();x.moveTo(i,0);x.lineTo(i,h);x.stroke();}
for(let i=0;i<h;i+=35){x.beginPath();x.moveTo(0,i);x.lineTo(w,i);x.stroke();}
// Override clearRect to also redraw background
const origClear=x.clearRect.bind(x);
x.clearRect=function(a,b,cw,ch){origClear(a,b,cw,ch);x.fillStyle='#080C12';x.fillRect(0,0,w,h);x.strokeStyle='rgba(35,44,61,.5)';x.lineWidth=0.5;for(let i=0;i<w;i+=50){x.beginPath();x.moveTo(i,0);x.lineTo(i,h);x.stroke();}for(let i=0;i<h;i+=35){x.beginPath();x.moveTo(0,i);x.lineTo(w,i);x.stroke();}};
return{c,x,W:w,H:h};}

/* === SHARED CANDLE UTILITIES === */
function drawCandle(x,cx,bw,o,h,l,c,p2y){
  const bull=c>=o;x.strokeStyle=bull?'#34D6C4':'#FF6B81';x.fillStyle=bull?'rgba(52,214,196,.85)':'rgba(255,107,129,.85)';
  x.lineWidth=1.2;x.beginPath();x.moveTo(cx+bw/2,p2y(h));x.lineTo(cx+bw/2,p2y(l));x.stroke();
  const top=Math.min(p2y(o),p2y(c)),bH=Math.max(4,Math.abs(p2y(c)-p2y(o)));
  x.fillRect(cx,top,bw,bH);
}
function genCandles(n,start,vol){
  const cd=[];let p=start||100;vol=vol||4;
  for(let i=0;i<n;i++){const o=p,mv=(Math.random()-.48)*vol,c=o+mv;
  const h=Math.max(o,c)+Math.random()*vol*.4,l=Math.min(o,c)-Math.random()*vol*.4;
  cd.push({o,h,l,c});p=c;}return cd;
}
function chartScale(candles,H,pad){
  pad=pad||18;const all=candles.flatMap(c=>[c.h,c.l]);const mx=Math.max(...all),mn=Math.min(...all);
  const rng=(mx-mn)||1;return p=>pad+(mx-p)/rng*(H-pad*2);
}
function drawCandleChart(x,W,H,candles,opts){
  opts=opts||{};const p2y=chartScale(candles,H,opts.pad||18);
  const gap=W/candles.length,bw=Math.max(5,gap*.6);
  candles.forEach((cd,i)=>{const cx=i*gap+(gap-bw)/2;drawCandle(x,cx,bw,cd.o,cd.h,cd.l,cd.c,p2y);});
  return{p2y,gap,bw};
}
function drawHLine(x,W,y,color,label,dashed){
  x.strokeStyle=color;x.lineWidth=1;if(dashed)x.setLineDash([4,3]);
  x.beginPath();x.moveTo(0,y);x.lineTo(W,y);x.stroke();x.setLineDash([]);
  if(label){x.fillStyle=color;x.font='9px IBM Plex Mono,monospace';x.fillText(label,4,y-4);}
}
function drawZone(x,W,y1,y2,color,label){
  x.fillStyle=color;x.fillRect(0,y1,W,y2-y1);
  if(label){x.fillStyle='#8C97AC';x.font='9px IBM Plex Mono,monospace';x.fillText(label,8,y1-4);}
}

/* Helper: draw grid (call after clearRect for animated canvases) */
function drawGrid(x,W,H){
x.fillStyle='#080C12';x.fillRect(0,0,W,H);
x.strokeStyle='rgba(35,44,61,.5)';x.lineWidth=0.5;
for(let i=0;i<W;i+=40){x.beginPath();x.moveTo(i,0);x.lineTo(i,H);x.stroke();}
for(let i=0;i<H;i+=40){x.beginPath();x.moveTo(0,i);x.lineTo(W,i);x.stroke();}}

/* Helper: smooth glow effect for lines */
function glowLine(x,pts,color,width){
x.shadowColor=color;x.shadowBlur=6;x.strokeStyle=color;x.lineWidth=width||2;x.beginPath();
pts.forEach((p,i)=>i===0?x.moveTo(p[0],p[1]):x.lineTo(p[0],p[1]));x.stroke();x.shadowBlur=0;}

/* ===================== MODULE DATA ===================== */
const M=[
/* ===== MODULE 1: THE JAPANESE ORIGINS & TRADING PHILOSOPHY ===== */
{id:'m1',g:'Foundations',t:'Origins & Philosophy of Candlestick Trading',b:'The history of Japanese candlestick analysis — Munehisa Homma, the Dojima Rice Exchange, and the psychological principles behind reading price.',
topics:[
{h:'Munehisa Homma — Father of Candlestick Charts',d:'In the 1700s, Munehisa Homma became the most successful rice trader in Japan. He developed candlestick techniques at the Dojima Rice Exchange in Osaka. He understood that <b>human emotions drive markets</b> — fear and greed create predictable price patterns. His trading records reportedly showed over 100 consecutive winning trades.',a:null},
{h:'The Dojima Rice Exchange',d:'The world\'s first futures market. Rice coupons (futures contracts) were traded on speculation. Homma studied years of weather, price, and psychological data to develop his methods. He communicated rice prices from Osaka to Sakata using a network of men on rooftops — the first "ticker system."',a:null},
{h:'The Core Principle: Markets Are Driven by Human Emotion',d:'Candlestick analysis is built on one idea: <b>price reflects the collective emotion of all participants</b>. Fear creates selling pressure (long upper wicks, red bodies). Greed creates buying pressure (long lower wicks, green bodies). Indecision creates small bodies and dojis. Every candle tells an emotional story.',a:'bullBear'},
{h:'Why Candlesticks Work Across All Markets',d:'Whether stocks, forex, crypto, or commodities — the patterns work because they reflect universal human psychology. Greed and fear don\'t change whether you\'re trading rice in 1750 or Bitcoin today. The time frame doesn\'t matter either — the psychology repeats from 1-minute to monthly charts.',a:'tfContext'},
{h:'The Candlestick Trader\'s Mindset',d:'<b>1.</b> You are not predicting — you are reading what other traders are feeling. <b>2.</b> No single candle pattern works in isolation — context is everything. <b>3.</b> Patience to wait for the right setup at the right level is 80% of the game. <b>4.</b> Risk management comes before any entry signal.',a:null},
{h:'What You Will Learn',d:'This curriculum teaches the same approach Homma developed: read the <b>story</b> price is telling through candle shapes and patterns, identify <b>where</b> to look (key levels), determine <b>what</b> to look for (specific patterns at those levels), and apply <b>strict rules</b> for entry, stop, and target.',a:null}
],
quiz:[
{q:'Munehisa Homma traded at:',o:['New York Stock Exchange','Dojima Rice Exchange (Osaka)','London Stock Exchange','Chicago Board of Trade'],a:1,e:'Homma developed his methods at Dojima Rice Exchange in 1700s Japan.'},
{q:'The core principle of candlestick analysis is:',o:['Price is random','Price reflects collective human emotion','Only volume matters','Charts are meaningless'],a:1,e:'Candles encode fear, greed, and indecision of all participants.'},
{q:'Candlestick patterns work across markets because:',o:['They are mathematical formulas','Human psychology (fear/greed) is universal','They only work in forex','They were designed for all markets'],a:1,e:'Same emotions, same patterns — regardless of the asset.'},
{q:'According to the candlestick philosophy, patience means:',o:['Trading every signal','Waiting for the right pattern at the right level','Never trading','Only trading once per month'],a:1,e:'Right pattern + right level = high-probability setup.'}
]},
/* ===== MODULE 2: CANDLESTICK ANATOMY & MARKET PSYCHOLOGY ===== */
{id:'m2',g:'Foundations',t:'Candlestick Anatomy & Market Psychology',b:'How to read the story each candle tells — body, shadows, and the emotions they encode.',
topics:[
{h:'The Body — Who Won the Battle',d:'The <b>body</b> (thick part) shows open-to-close range. A <b>large bullish body</b> = buyers dominated the entire period. A <b>large bearish body</b> = sellers dominated. The body is the most important part — it tells you WHO WON.',a:'ohlc'},
{h:'The Shadows (Wicks) — Rejected Price',d:'The thin lines above and below the body. <b>Upper shadow</b> = price went UP but was pushed BACK DOWN (sellers rejected the high). <b>Lower shadow</b> = price went DOWN but was pushed BACK UP (buyers rejected the low). Longer shadow = stronger rejection.',a:'wicks'},
{h:'Big Body, Small Shadows — Conviction',d:'When the body is large relative to the shadows, one side had <b>complete control</b>. A big green body with tiny wicks = buyers overwhelmed sellers with zero hesitation. This is pure conviction. In the book this is called a "Marubozu" — a candle of dominance.',a:'bodySize'},
{h:'Small Body, Big Shadows — Indecision & Rejection',d:'When the body is tiny but shadows are long, the market was <b>violently indecisive</b>. Price explored both extremes but settled near the middle. This is a battle where neither side could hold ground. Often appears before reversals.',a:'doji'},
{h:'The Psychology of a Bullish Candle',d:'Open → sellers push price down (lower shadow forms) → <b>buyers step in aggressively</b> → push price above open → hold it there through close. The candle\'s story: "Sellers tried and FAILED. Buyers took control." The longer the lower shadow, the more dramatically sellers were rejected.',a:'bullBear'},
{h:'The Psychology of a Bearish Candle',d:'Open → buyers push price up (upper shadow forms) → <b>sellers overwhelm</b> → push price below open → hold it down through close. Story: "Buyers tried and FAILED. Sellers took control." Long upper shadow = maximum buyer rejection.',a:'bullBear'},
{h:'Reading Candles as a Story, Not a Shape',d:'Never memorize patterns mechanically. Each candle is a <b>one-act story</b>: Who attacked first? Who won? How decisive was the victory? A hammer isn\'t just "small body, long lower wick" — it\'s the story of sellers being overwhelmed after attempting to push price down.',a:'candleVsLine'},
{h:'The Emotional Cycle in Every Candle',d:'Every candle contains a micro-cycle: <b>Hope</b> (opening expectations) → <b>Fear</b> (adverse move against holders) → <b>Greed</b> (winners pressing advantage) → <b>Resolution</b> (close determines who won). Understanding this cycle is the foundation of everything that follows.',a:null}
],
quiz:[
{q:'A large bullish body with tiny wicks means:',o:['Indecision','Buyers dominated with total conviction','Sellers won','No trading happened'],a:1,e:'Large body + small wicks = one side completely in control.'},
{q:'A long upper shadow tells you:',o:['Buyers are in control','Price was rejected from highs (sellers pushed it back down)','The trend is up','Volume was high'],a:1,e:'Upper shadow = price went up but couldn\'t hold = seller rejection.'},
{q:'According to the book, you should read candles as:',o:['Mathematical shapes to memorize','Stories of who attacked, who won, how decisively','Random noise','Volume indicators'],a:1,e:'Each candle tells an emotional story of the battle.'},
{q:'A small body with long shadows on both sides indicates:',o:['Strong trend','Violent indecision — neither side could hold','Bullish continuation','Only appears in ranging markets'],a:1,e:'Big shadows + tiny body = battle with no clear winner.'}
]},
/* ===== MODULE 3: THE THREE KEY PATTERNS (Pin Bar, Engulfing, Inside Bar) ===== */
{id:'m3',g:'Candlestick Bible',t:'The Three Key Patterns',b:'The Candlestick Trading Bible focuses on THREE patterns that work — the Pin Bar, the Engulfing, and the Inside Bar. Master these three; ignore the rest.',
topics:[
{h:'Why Only Three Patterns?',d:'Most books teach 40+ patterns. The Candlestick Bible says: <b>forget most of them</b>. Three patterns, traded at the right levels with the right context, are all you need. Simplicity + discipline beats encyclopedic knowledge every time.',a:null},
{h:'THE PIN BAR — Anatomy',d:'A candle with a <b>small body</b> at one end and a <b>long shadow (tail)</b> at the other. The tail must be at least 2/3 of the total candle length. The body should be within the range of the prior candle. The tail is the rejection — it shows price tried to go one way and was violently rejected.',a:'hammer'},
{h:'Bullish Pin Bar (Hammer)',d:'Long <b>lower tail</b>, small body at the top. Found after a decline or at support. Story: sellers pushed price aggressively lower, but <b>buyers overwhelmed them</b> and pushed price back up to close near the high. The longer the tail, the more violent the rejection.',a:'hammer'},
{h:'Bearish Pin Bar (Shooting Star)',d:'Long <b>upper tail</b>, small body at the bottom. Found after a rally or at resistance. Story: buyers pushed price higher, but <b>sellers crushed them</b> and drove price back to close near the low. The upper tail is a gravestone for the bulls.',a:'shootingStar'},
{h:'Pin Bar Psychology — Why It Works',d:'The long tail represents <b>trapped traders</b>. In a bullish pin bar, all the traders who sold during that candle are now underwater — their stops are below the tail. This creates fuel for the move up (short-covering). The pattern works because it creates a pool of trapped sellers.',a:null},
{h:'Pin Bar Confirmation Rules',d:'<b>1.</b> Tail must be 2/3+ of total candle. <b>2.</b> Body must be small (ideally 1/3 or less). <b>3.</b> Must occur at a key level (support/resistance). <b>4.</b> Direction must align with higher timeframe trend. <b>5.</b> Ignore pin bars in the middle of nowhere.',a:null},
{h:'THE ENGULFING PATTERN — Anatomy',d:'A two-candle pattern where the second candle\'s <b>body completely engulfs</b> the first candle\'s body. The second candle shows a complete shift of power from one side to the other. It represents a dramatic emotional reversal in a single period.',a:'engulfing'},
{h:'Bullish Engulfing',d:'After a decline: small bearish candle followed by a <b>larger bullish candle that fully covers</b> the prior body. Psychology: the first candle shows bears are tiring (small body). The second candle shows buyers arrived with overwhelming force — they didn\'t just stop the decline, they reversed it entirely in one candle.',a:'engulfing'},
{h:'Bearish Engulfing',d:'After a rally: small bullish candle followed by a <b>larger bearish candle that fully covers</b> the prior body. Psychology: bulls are exhausted (small body showing weak last push). Then sellers arrive with brutal force — erasing all of the prior gains and more in a single period.',a:'engulfing'},
{h:'Engulfing Confirmation Rules',d:'<b>1.</b> Second body must FULLY contain the first body. <b>2.</b> The bigger the second candle relative to the first, the stronger the signal. <b>3.</b> Must occur at a key level. <b>4.</b> In a trend direction or at a clear reversal point. <b>5.</b> Higher timeframe engulfing > lower TF.',a:null},
{h:'THE INSIDE BAR — Anatomy',d:'A candle whose <b>entire range (high to low) is contained within the prior candle\'s range</b>. The mother candle is the big one; the inside bar is the smaller one nestled within it. It represents <b>consolidation and indecision</b> — a coiling spring about to release.',a:null},
{h:'Inside Bar Psychology',d:'After a big move (mother candle), the market <b>pauses to digest</b>. Neither buyers nor sellers can push beyond the mother candle\'s range. Energy builds. When price finally breaks out of the inside bar\'s range, it often explodes in that direction — the compressed energy releases.',a:null},
{h:'Trading the Inside Bar Breakout',d:'<b>1.</b> Identify a clear mother candle (large, decisive). <b>2.</b> Wait for 1+ inside bars to form within it. <b>3.</b> Place a buy stop above the inside bar high, sell stop below inside bar low. <b>4.</b> Whichever triggers first = the trade. <b>5.</b> Stop goes on the opposite side. <b>6.</b> Works best at key levels or after a trend move.',a:null},
{h:'The False Break of the Inside Bar',d:'Sometimes price breaks one side of the inside bar, traps traders, then reverses through the other side. This is a <b>powerful signal</b> — the trapped traders add fuel to the real move. Wait for a candle close beyond the level for confirmation, not just a wick.',a:null}
],
quiz:[
{q:'The Pin Bar tail should be at least:',o:['1/4 of the candle','1/2 of the candle','2/3 of the total candle length','The exact same as the body'],a:2,e:'Tail = 2/3+ of total candle for a valid pin bar.'},
{q:'A bullish pin bar works because:',o:['It looks nice','Trapped sellers (below the tail) create fuel for the move up','It always works at any level','It means high volume'],a:1,e:'Trapped shorts = covering pressure = fuel for rally.'},
{q:'Engulfing pattern requires the second candle to:',o:['Have a longer wick','Fully cover the first candle\'s body','Be the same size','Gap up/down'],a:1,e:'Full body engulfment = complete power shift.'},
{q:'Inside Bar represents:',o:['Strong momentum','Consolidation/compression before a breakout','Trend end guaranteed','Only works in forex'],a:1,e:'Energy compresses inside the mother candle, then releases.'},
{q:'The book says to focus on how many patterns?',o:['40+','12','3 (Pin Bar, Engulfing, Inside Bar)','1'],a:2,e:'Three patterns at the right level with discipline = enough.'}
]},

/* ===== MODULE 4: MARKET STRUCTURE & THE 4 STAGES ===== */
{id:'m4',g:'Candlestick Bible',t:'Market Structure & The Four Stages',b:'Trending vs ranging, how to identify what the market is doing RIGHT NOW, and the four repeating stages every market cycles through.',
topics:[
{h:'The Two States of Any Market',d:'At any moment, a market is either <b>TRENDING</b> (making directional progress) or <b>RANGING</b> (going sideways in a box). Your entire approach changes based on which state you are in. Trading a range strategy in a trend = losses. Trading a trend strategy in a range = losses.',a:'range'},
{h:'Trending Market — How to Identify',d:'<b>Uptrend</b>: series of higher highs + higher lows. Each pullback holds above the prior low. <b>Downtrend</b>: series of lower highs + lower lows. Each rally fails below prior high. If you can draw a clear staircase of HH/HL or LH/LL, you are in a trend.',a:'uptrend'},
{h:'Ranging Market — How to Identify',d:'Price bounces between a clear <b>ceiling (resistance)</b> and <b>floor (support)</b> without making new directional progress. The highs are roughly equal. The lows are roughly equal. If you cannot see a staircase, you are in a range.',a:'range'},
{h:'The Trap: Treating Ranges as Trends',d:'Most traders lose money by <b>buying breakouts that fail</b> in a range or <b>fighting the trend</b> trying to pick tops/bottoms. Step 1 of ANY analysis: determine if you are in a trend or a range FIRST. Everything else follows from this.',a:null},
{h:'Stage 1: ACCUMULATION',d:'After a downtrend, the market enters a <b>sideways range</b>. Smart money is quietly buying from retail sellers who are still bearish. Volume is low. Looks boring. Retail traders ignore it or keep shorting. This is where the next big move is being built.',a:'po3'},
{h:'Stage 2: ADVANCING (Markup)',d:'The range breaks out upward. <b>Price trends higher</b> with HH/HL structure. Volume increases. Retail finally notices and starts buying. This is the "easy money" phase where trend-following works beautifully. Pin bars at pullback levels = ideal entries.',a:'uptrend'},
{h:'Stage 3: DISTRIBUTION',d:'After a long uptrend, price enters another <b>sideways range at the top</b>. Smart money is selling to the late-arriving retail buyers who are now euphoric. Looks like "consolidation before another leg up" — but it\'s actually the exit phase.',a:'po3'},
{h:'Stage 4: DECLINING (Markdown)',d:'The range breaks down. <b>Price trends lower</b> with LH/LL structure. Fear replaces greed. Retail panic-sells. This phase often moves faster than the advancing phase because fear is stronger than greed.',a:'downtrend'},
{h:'Identifying Which Stage You Are In',d:'<b>1.</b> Was there a prior trend? <b>2.</b> Is price currently in a range or trending? <b>3.</b> Is the range at a previous high (distribution) or previous low (accumulation)? <b>4.</b> Has the range broken out in a direction? Answer these and you know your stage.',a:null},
{h:'Why This Matters for Candlestick Trading',d:'<b>Accumulation/Distribution</b>: trade inside bar breakouts, range fades. <b>Advancing/Declining</b>: trade pin bars and engulfing patterns at pullback support/resistance within the trend. Your pattern ONLY matters if you know which stage the market is in.',a:null}
],
quiz:[
{q:'The two states of any market are:',o:['Bull and bear','Trending and ranging','Fast and slow','Volatile and calm'],a:1,e:'Every market is either trending (directional) or ranging (sideways).'},
{q:'Accumulation happens:',o:['After an uptrend at the top','After a downtrend — smart money buys in a range while retail sells','During the trending phase','Only in forex'],a:1,e:'Accumulation = quiet buying at lows after a decline.'},
{q:'Distribution looks like:',o:['A breakout','A sideways range at a top where smart money exits to retail','A downtrend','A bullish engulfing'],a:1,e:'Smart money sells into retail buying euphoria at the top.'},
{q:'The most common mistake traders make:',o:['Using candlesticks','Treating a range as a trend (buying breakouts that fail)','Waiting for confirmation','Using stop-losses'],a:1,e:'Range breakout failures are the #1 retail trap.'},
{q:'In the advancing stage, you should:',o:['Short every new high','Trade pin bars at pullback levels with the trend','Wait for distribution','Only trade inside bars'],a:1,e:'Trend phase = trade with the trend at pullback levels.'}
]},
/* ===== MODULE 5: SUPPORT/RESISTANCE & TRADING STRATEGIES (Candlestick Bible) ===== */
{id:'m5',g:'Candlestick Bible',t:'Key Levels & Trading Strategies',b:'How to identify key levels, then trade your three patterns at those levels with exact entry, stop-loss, and target rules.',
topics:[
{h:'What is a Key Level?',d:'A price level where the market has <b>repeatedly</b> reversed or reacted. Not just any line — it must have at least 2-3 clear historical reactions. The more times price has respected a level, the more significant it is. These are the ONLY places you should look for your candlestick signals.',a:'hSupport'},
{h:'Drawing Support Levels',d:'Look left. Find the price levels where the market <b>bounced up multiple times</b>. Connect these lows with a horizontal line/zone. Use the candle bodies, not just wicks. A level that held 3+ times is very significant. These are your "buy zones."',a:'hSupport'},
{h:'Drawing Resistance Levels',d:'Find price levels where the market was <b>rejected down multiple times</b>. Connect these highs. Resistance that has held 3+ times is strong. These are your "sell zones." When you see a bearish pin bar or bearish engulfing HERE — that is your signal.',a:'hResist'},
{h:'Support Becomes Resistance (Role Reversal)',d:'When a support level <b>breaks</b>, old buyers are now trapped. When price retests that level from below, those trapped buyers sell to "get out at breakeven." Their selling turns old support into new resistance. This is one of the highest-probability setups in trading.',a:'roleReversal'},
{h:'STRATEGY 1: Pin Bar at Key Level',d:'<b>Setup:</b> Price approaches a key S/R level. A pin bar forms WITH the tail rejecting the level. <b>Entry:</b> Place buy/sell stop 2-3 pips beyond the pin bar body (in the direction of the expected move). <b>Stop:</b> 2-3 pips beyond the pin bar tail. <b>Target:</b> Next key level or 2:1 R:R minimum.',a:'hammer'},
{h:'STRATEGY 2: Engulfing at Key Level',d:'<b>Setup:</b> Price hits key S/R. An engulfing pattern forms. <b>Entry:</b> Enter at the close of the engulfing candle, or place a stop entry 2 pips beyond its high/low. <b>Stop:</b> Beyond the engulfing candle\'s opposite extreme. <b>Target:</b> Next S/R level or 2:1 R:R.',a:'engulfing'},
{h:'STRATEGY 3: Inside Bar Breakout',d:'<b>Setup:</b> After a strong move or at a key level, an inside bar forms (consolidation). <b>Entry:</b> Buy stop above inside bar high / sell stop below inside bar low. <b>Stop:</b> Opposite side of the inside bar. <b>Target:</b> Width of the mother candle projected from breakout point, or next level.',a:null},
{h:'The Confluence Rule',d:'A signal is <b>10x stronger</b> when multiple factors align: <b>1.</b> Key level (S/R that held 3+ times). <b>2.</b> Trend direction (trading WITH the trend). <b>3.</b> A valid candlestick pattern. When all three align = A+ setup. When only pattern exists (no level, no trend) = skip it.',a:null},
{h:'Timeframe Selection',d:'The book recommends <b>Daily and 4-Hour charts</b> for most traders. Daily = less noise, clearer signals, fewer but higher-quality setups. 4H = more opportunities but more noise. Avoid 5m/15m unless you\'re an experienced scalper. Higher TF = higher probability.',a:'tfContext'},
{h:'Trading With the Trend',d:'In an uptrend: ONLY take bullish signals (bullish pin bars, bullish engulfing) at pullback support levels. In a downtrend: ONLY take bearish signals at pullback resistance. <b>Never trade against the trend direction</b> unless at a major HTF level.',a:'uptrend'},
{h:'Stop-Loss Placement Philosophy',d:'Your stop goes at the point where your <b>setup is invalidated</b>. For a pin bar: if price goes beyond the tail, your thesis is wrong. For engulfing: if price goes beyond the engulfing candle\'s extreme, the signal failed. <b>Never</b> use arbitrary fixed-pip stops — always use structure-based stops.',a:null},
{h:'Taking Profits — Don\'t Be Greedy',d:'<b>Option A:</b> Close at the next key level (most conservative). <b>Option B:</b> Close half at 1:1 R:R, move stop to breakeven, let rest run to 2:1 or 3:1. <b>Option C:</b> Trail stop below each new swing low (in an uptrend). The book emphasizes: let winners run but have a PLAN before entering.',a:null}
],
quiz:[
{q:'A "key level" requires:',o:['Just one touch','2-3+ clear historical reactions/bounces','Any horizontal line','Only round numbers'],a:1,e:'Multiple reactions = proven significant level.'},
{q:'Pin bar stop-loss goes:',o:['10 pips from entry','Beyond the pin bar tail (where thesis invalidates)','At the body middle','Below the prior candle'],a:1,e:'Beyond the tail = setup is invalidated = exit.'},
{q:'The confluence rule says A+ setups need:',o:['Just a valid pattern','Key level + trend direction + valid pattern (all three)','Only a key level','High volume'],a:1,e:'All three aligning = highest probability.'},
{q:'The recommended timeframes for most traders are:',o:['1m and 5m','Daily and 4H','Weekly only','Tick charts'],a:1,e:'Daily/4H = less noise, higher-quality signals.'},
{q:'Support becomes resistance when:',o:['It\'s tested 5 times','It breaks — trapped buyers sell at retest, flipping the role','The trend is strong','Volume increases'],a:1,e:'Broken support + retest = trapped buyers sell = now resistance.'},
{q:'In an uptrend, you should ONLY look for:',o:['Bearish signals to short the top','Bullish signals at pullback support levels','Both bullish and bearish signals','Doji candles'],a:1,e:'Trade WITH the trend at pullback levels.'}
]},

/* ===== MODULE 6: MARKET STRUCTURE (COMPREHENSIVE SMC) ===== */
{id:'m6',g:'Smart Money & Structure',t:'Market Structure — SMC/ICT',b:'The institutional framework for reading price: swing structure, BOS, CHoCH, MSS. This is how smart money reads the market — not patterns, but the STRUCTURE of price itself.',
topics:[
{h:'Swing High & Swing Low — The Foundation',d:'A <b>swing high</b> is a candle (or group) with lower highs on BOTH sides — a clear peak. A <b>swing low</b> is a candle with higher lows on both sides — a clear valley. ALL structure analysis starts by identifying these swings. If you can\'t mark swing points correctly, nothing else works. Practice marking them until it becomes second nature.',a:'swingHL'},
{h:'Higher High (HH) & Higher Low (HL) — Bullish Structure',d:'When each new swing high exceeds the prior swing high AND each new swing low holds above the prior swing low, the market has <b>bullish structure</b>. This is not just "price going up" — it\'s an organized sequence showing buyers are consistently in control. Every pullback is bought before it reaches the prior low. This is the staircase of bull control.',a:'hhhl'},
{h:'Lower High (LH) & Lower Low (LL) — Bearish Structure',d:'Mirror of bullish. Each rally fails to reach the prior high (sellers cap it earlier each time). Each decline breaks below the prior low. Sellers are systematically in control. The staircase descends. You can feel the desperation of buyers getting weaker with each failed rally.',a:'lhll'},
{h:'Break of Structure (BOS) — Trend Continuation Confirmed',d:'BOS happens when price closes beyond a prior significant swing point <b>IN the direction of the existing trend</b>. In an uptrend, price breaks above a prior swing high = bullish BOS. This CONFIRMS the trend is continuing. Think of it as the market saying: "Yes, I\'m still going up. The bulls are STILL in charge." This is your green light to look for entries with the trend.',a:'bos'},
{h:'Change of Character (CHoCH) — First Warning Shot',d:'CHoCH is the <b>FIRST break against</b> the prevailing trend. In an uptrend: price breaks below the most recent higher low. In a downtrend: price breaks above the most recent lower high. This doesn\'t mean the trend has reversed — it means the trend\'s RHYTHM is broken. It\'s a warning, not a reversal signal. Think of it as a yellow traffic light — proceed with caution.',a:'choch'},
{h:'Market Structure Shift (MSS) — Confirmed Reversal',d:'MSS is more decisive than CHoCH. After the CHoCH breaks the rhythm, MSS confirms a NEW structure is forming in the opposite direction. You need to see: <b>1.</b> CHoCH occurs. <b>2.</b> Price then creates a new swing in the opposing direction. <b>3.</b> That new swing holds (new HL in a reversal to bullish, or new LH in reversal to bearish). Only THEN is the reversal confirmed. This is the red light — the old trend is dead.',a:'mss'},
{h:'Internal vs External Structure',d:'<b>External structure</b> = the major swing highs and lows on your analysis timeframe. The "big picture." <b>Internal structure</b> = the smaller swings WITHIN each leg of the external structure. Think of it like this: a daily uptrend (external) might have 4-hour pullbacks within each leg (internal). You use external to determine DIRECTION and internal to find ENTRIES within that direction.',a:null},
{h:'Fair Value Gap (FVG) — The Imbalance',d:'When a candle moves so aggressively that there\'s a <b>visible gap between candle 1\'s wick and candle 3\'s wick</b>, that gap is an FVG. It represents price that moved so fast there was no fair two-sided trading there. The market tends to "fill" these gaps later — price returns to them like a magnet. FVGs are entry zones, not signals. You wait for price to return to the FVG, THEN look for a reaction.',a:'fvg'},
{h:'Imbalance & Inefficiency — Why Price Returns',d:'An imbalance is any area where price moved too one-sidedly. The market seeks <b>efficiency</b> — it wants every price level to have been tested by both buyers and sellers. When it hasn\'t (imbalance), price is drawn back to "fix" the inefficiency. This is why strong moves often retrace 50-70% — the market is filling imbalances from the initial impulse.',a:'imbalance'},
{h:'Bullish Order Block (OB) — Institutional Footprint',d:'The <b>last bearish candle</b> before a strong bullish impulse. Why? Because that\'s where institutions placed their buy orders. They needed sellers (the bearish candle = selling pressure) to fill their large buy orders against. When price returns to this level, remaining unfilled institutional buy orders may still be there — creating a bounce. The OB is where smart money ENTERED.',a:'bullOB'},
{h:'Bearish Order Block',d:'The <b>last bullish candle</b> before a strong bearish impulse. Institutions needed buyers (bullish candle) to sell into. Their unfilled sell orders remain at that level. When price retests, it often rejects. The bigger the impulse after the OB, the more institutional conviction was behind it, the more likely the OB holds on retest.',a:'bearOB'},
{h:'Breaker Block — The Failed OB',d:'An order block that <b>price went through</b> (failed to hold). Now it acts as S/R in the OPPOSITE direction. Why? Because everyone who traded at the OB is now trapped. Their liquidation orders sit at the OB level. When price returns, it gets absorbed by these liquidations, creating a reaction in the opposite direction. A failed support becomes resistance.',a:'breaker'},
{h:'Mitigation Block',d:'When price returns to a previously untested zone and partially fills unfilled orders there. Unlike a breaker (which failed completely), a mitigation block is a zone where <b>partial</b> orders remain. Price touches it, absorbs some orders, then continues. Think of it as "cleaning up" leftover institutional orders.',a:'mitigation'},
{h:'Rejection Block',d:'A candle with a <b>very long wick</b> showing violent rejection at a level. The wick zone becomes future S/R because it proved that one side has overwhelming power at that price. The wick is the battlefield where one army was completely routed. Price remembers that "massacre" and reacts when it returns.',a:'rejection'},
{h:'Buy-Side Liquidity (BSL) — Fuel Above',d:'Above every swing high sits a <b>pool of resting orders</b>: stop-losses of short sellers + buy-stop orders of breakout traders. Smart money KNOWS these orders are there. They drive price up to those levels to <b>trigger the stops</b> and fill their own large orders against the rush of buying. Then price reverses. The "breakout" was a trap to access liquidity.',a:'bsl'},
{h:'Sell-Side Liquidity (SSL) — Fuel Below',d:'Below every swing low: stop-losses of long holders + sell-stops of breakdown traders. Same concept in reverse. Smart money pushes price into these pools to trigger the cascade of selling, fills their buy orders against it, then reverses price upward. What retail calls a "stop hunt," institutions call "filling orders."',a:'ssl'},
{h:'Internal Range Liquidity (IRL)',d:'Liquidity that exists INSIDE a trading range — the FVGs, order blocks, and minor swing points within the move itself. Price often fills IRL (internal levels) before targeting ERL (the extremes). Think of it as: "The market cleans up the inside of the range before going for the edges."',a:'irl'},
{h:'External Range Liquidity (ERL)',d:'The liquidity at the EXTREMES of a range — the actual swing highs and lows. After internal liquidity is taken, price targets external range liquidity. The trading cycle: <b>IRL → ERL → IRL → ERL</b>. Understanding this flow tells you where price is heading NEXT.',a:'erl'},
{h:'Equal Highs (EQH) & Equal Lows (EQL)',d:'When two or more swing highs (or lows) print at virtually the same price, it creates an <b>extremely obvious liquidity pool</b>. Every textbook says "double top = resistance." Smart money sees: "double top = maximum resting orders to be swept." EQH/EQL are HIGH-probability sweep targets. They\'re almost guaranteed to be taken.',a:'eqhl'},
{h:'Liquidity Sweep / Grab',d:'The actual event: price <b>spikes through</b> a known liquidity level (EQH, old high, S/R), triggers all the resting orders, then IMMEDIATELY reverses. The spike is not a breakout — it\'s a SWEEP. The key: look for the sweep, then look for a reversal signal (OB, FVG entry) in the opposite direction. Sweeps SET UP the real move.',a:'sweep'},
{h:'Stop Hunt — The Institutional Play',d:'A deliberate push past obvious S/R specifically to trigger retail stop-losses. How to tell a stop hunt from a real breakout: <b>1.</b> Price moves past the level violently but briefly. <b>2.</b> It doesn\'t hold above/below — it immediately snaps back. <b>3.</b> A displacement (strong candle) follows in the opposite direction. If it holds beyond the level with strong closes, it\'s a real break.',a:'stopHunt'},
{h:'Premium & Discount Zones',d:'Take any range from swing low to swing high. The 50% midpoint is <b>equilibrium</b>. Above 50% = <b>premium</b> (expensive, look for sells). Below 50% = <b>discount</b> (cheap, look for buys). Smart money buys in discount and sells in premium. Retail does the opposite — they buy at highs (premium) out of FOMO and sell at lows (discount) out of fear.',a:'premium'},
{h:'Displacement — Showing Intent',d:'A single large candle (or 2-3 back-to-back large bodies with minimal wicks) that moves price aggressively. This is <b>institutional intent made visible</b>. It\'s NOT just a big candle — it has meaning. It tells you: "Smart money just committed. The direction of this displacement is the direction they want price to go." FVGs created by displacement are the most valid.',a:'displacement'},
{h:'Inducement — The Trap Before the Move',d:'A small, tempting move that <b>lures retail traders</b> into the wrong position right before the real move. Example: price makes a small break above a minor high (retail buys the "breakout"), then immediately dumps. That small break was inducement — it existed only to create liquidity (retail buy stops) for smart money to sell into. The lesson: not every break is real.',a:'inducement'},
{h:'Power of 3 (PO3) — The Daily Blueprint',d:'Most trending days follow this sequence: <b>Phase 1 - Accumulation</b> (Asian session): low volatility range, building orders. <b>Phase 2 - Manipulation</b> (London open): a FALSE move against the daily direction, sweeping Asian session liquidity. <b>Phase 3 - Distribution</b> (NY session): the REAL directional move, targeting daily liquidity. If you can identify which phase you\'re in, you know what\'s coming next.',a:'po3'},
{h:'Timeframe Alignment — The Confirmation Stack',d:'The highest-probability setups occur when: <b>HTF (Daily/Weekly)</b> shows clear bias direction. <b>MTF (4H/1H)</b> shows structure supporting that direction. <b>LTF (15m/5m)</b> gives you the precise entry trigger (OB, FVG, pattern). Never trade a LTF signal that contradicts HTF direction. Alignment = highest probability. Conflict = stay out.',a:'tfAlign'}
],
quiz:[
{q:'BOS confirms:',o:['Reversal','Trend continuation','Indecision','A pattern'],a:1,e:'BOS = break in trend direction = continuation confirmed.'},
{q:'CHoCH is:',o:['Trend continuation','First break against prevailing trend (warning)','A candle pattern','Volume spike'],a:1,e:'First opposing break = the trend rhythm is broken.'},
{q:'FVG forms when:',o:['One big candle appears','Candle 1 wick and candle 3 wick dont overlap (gap between)','Price gaps overnight','Volume spikes'],a:1,e:'Three-candle imbalance where wicks dont meet = FVG.'},
{q:'Order Block is:',o:['Highest volume bar','Last opposing candle before impulsive move (institutional entry)','Any S/R level','A gap'],a:1,e:'Where institutions placed their orders = last opposing candle.'},
{q:'Equal highs are important because:',o:['Strong resistance','They mark obvious liquidity pools almost guaranteed to be swept','Trend continuation','They mean nothing'],a:1,e:'EQH = maximum resting orders = high-probability sweep target.'},
{q:'Premium zone is for:',o:['Buying aggressively','Selling/shorting (price is expensive relative to range)','Both equally','Neither'],a:1,e:'Premium = above equilibrium = expensive = sell zone.'},
{q:'Power of 3 daily sequence:',o:['Expansion→Contraction→Expansion','Accumulation (Asia) → Manipulation (London) → Distribution (NY)','Buy→Hold→Sell','Random'],a:1,e:'PO3: Accumulate quietly, manipulate with a fake move, distribute the real move.'},
{q:'A displacement candle shows:',o:['Indecision','Genuine institutional commitment to a direction','Retail activity only','Low volume'],a:1,e:'Large aggressive candle = smart money showing their hand.'}
]},
/* ===== MODULE 7: SUPPLY & DEMAND ZONES ===== */
{id:'m7',g:'Smart Money & Structure',t:'Supply & Demand Zones',b:'Where institutional order clusters hide — how to identify zones, understand their formation, trade retests, and know when a zone is dead.',
topics:[
{h:'What IS a Supply/Demand Zone?',d:'Unlike support/resistance (which is just a level), a supply/demand zone is a <b>specific price AREA where an aggressive move originated</b>. The theory: large institutions cannot fill their entire order at once — they leave unfilled orders behind. When price returns to that area, those remaining orders activate, creating a reaction. The zone is literally "unfinished business."',a:'demandZone'},
{h:'Demand Zone — Where Buyers Overwhelmed Sellers',d:'A demand zone is the <b>base area where a strong rally began</b>. Look for: price declining into an area → consolidation (base) → explosive move UP. That base = demand zone. Buyers entered so aggressively there that sellers were completely overwhelmed. When price returns, remaining buy orders may still be waiting.',a:'demandZone'},
{h:'Supply Zone — Where Sellers Overwhelmed Buyers',d:'The mirror: the base area where a <b>strong decline began</b>. Price rising into an area → consolidation → explosive move DOWN. That base = supply zone. Sellers entered with such force that buyers were crushed. On retest, remaining sell orders activate.',a:'supplyZone'},
{h:'Rally-Base-Rally (RBR) — Continuation Demand',d:'Price rallies, pauses briefly in a <b>tight consolidation (base)</b>, then rallies again. The base is a demand zone because buyers re-loaded there mid-trend. This is continuation demand — trend-following. Higher probability because it aligns with existing momentum.',a:'rbr'},
{h:'Drop-Base-Drop (DBD) — Continuation Supply',d:'Price drops, pauses in a tight base, then drops again. The base is supply — sellers reloaded. Also continuation (trend-aligned). Same logic as RBR but bearish.',a:'dbd'},
{h:'Rally-Base-Drop (RBD) — Reversal Supply',d:'Price was rallying, formed a base at the top, then <b>dropped hard</b>. The base marks where sellers took over from exhausted buyers. This is reversal supply — higher risk but higher reward because you\'re catching a turning point.',a:'rbd'},
{h:'Drop-Base-Rally (DBR) — Reversal Demand',d:'Price was declining, formed a base at the bottom, then <b>rallied hard</b>. Buyers absorbed all selling and reversed it. Reversal demand. Again, catching a turn — higher risk, but explosive when it works.',a:'dbr'},
{h:'Zone Freshness — First Touch is Best',d:'A zone is <b>"fresh" if price hasn\'t returned to it</b> since it was created. Fresh zones have the highest probability because unfilled orders haven\'t been absorbed yet. First retest = best reaction. Second retest = weaker. Third retest = zone is likely dead.',a:'freshness'},
{h:'Zone Invalidation — When to Walk Away',d:'A zone is <b>invalidated when price closes CLEANLY through it</b> (not just a wick). A clean body close beyond the zone means the remaining orders were either absorbed or pulled. The zone is dead — do NOT expect it to hold again. Many traders lose money re-entering at dead zones.',a:'zoneInvalid'},
{h:'Refining Zones on Lower Timeframes',d:'A daily supply zone might be 50 pips wide. Zoom to 1H or 15m and find the <b>exact candle (order block) within that zone</b> where the move started. This gives you a refined, tight entry instead of a wide zone. Tighter entry = better risk:reward. This is "nested" or refined zone trading.',a:'nestedZone'},
{h:'Quality Checklist for Zones',d:'<b>1.</b> Was the departure move strong? (large candles, displacement) <b>2.</b> Is the zone fresh? (first return) <b>3.</b> Did price spend little time in the zone? (fast departure = more unfilled orders) <b>4.</b> Does it align with HTF trend? <b>5.</b> Is there confluence? (OB, FVG, Fib level). Score 4/5 = A+ zone.',a:null}
],
quiz:[
{q:'A "fresh" zone means:',o:['It formed today','Price hasnt returned to it since formation','Its been tested 3 times','Only exists on daily charts'],a:1,e:'Fresh = untested = unfilled orders likely still waiting.'},
{q:'RBD stands for:',o:['Rally-Base-Drop (reversal supply zone)','Reject-Break-Dive','Resistance-Breakout-Dip','Range-Bound-Distribution'],a:0,e:'Rally up, Base forms, then Drop = supply zone at the top.'},
{q:'Zone invalidation happens when:',o:['Price wicks through','Price closes cleanly through it (body beyond zone)','Volume increases at the zone','A doji forms there'],a:1,e:'Clean body close through = orders absorbed = zone dead.'},
{q:'The strongest zones have:',o:['Many retests','A strong/fast departure move and are being retested for the first time','Small departure moves','Been tested 5+ times'],a:1,e:'Strong move away + first retest = maximum probability.'}
]},

{id:'m8',g:'Smart Money & Structure',t:'Chart Patterns — The Psychology Behind the Geometry',b:'Triangles, flags, wedges, H&S, double tops — understood not as shapes to memorize but as STORIES of who is winning the battle.',
topics:[
{h:'Why Chart Patterns Work',d:'Patterns aren\'t magic geometry. They work because they represent <b>consistent psychological sequences</b>. A head & shoulders works because it shows buyers getting progressively weaker (lower right shoulder) until they can\'t push anymore. Understanding WHY a pattern works lets you judge WHEN it will fail.',a:null},
{h:'Ascending Triangle — Buyers Getting Aggressive',d:'Flat resistance (sellers defend a level) but <b>lows keep rising</b> (buyers are bidding higher each time). Each pullback is smaller. Buyers are getting more aggressive, sellers are holding their ground. Eventually, the relentless buying pressure overwhelms the fixed resistance → breakout UP. The rising lows are the tell: buyers won\'t wait for lower prices anymore.',a:'ascTriangle'},
{h:'Descending Triangle — Sellers Getting Aggressive',d:'Flat support but <b>highs keep falling</b>. Sellers press harder each rally. Buyers defend support but get less help from rallies. Eventually sellers break through the floor. Symmetrical to ascending triangle — the falling highs tell you sellers are winning the war of attrition.',a:'descTriangle'},
{h:'Symmetrical Triangle — Compression Before Explosion',d:'Both sides are converging. Highs falling AND lows rising. Neither side winning. Energy is <b>compressing</b> like a spring. The breakout direction determines the trade — you don\'t predict, you REACT. Often the breakout aligns with the prior trend (continuation bias).',a:'symTriangle'},
{h:'Bull Flag & Bear Flag — Pause in a War',d:'A <b>flag is a brief consolidation against the trend</b> after a sharp move (the "pole"). Bull flag: sharp rally → small downward-drifting channel → continuation up. The flag represents profit-taking by early longs, but the underlying pressure hasn\'t changed. When the flag breaks, the move resumes with fresh energy.',a:'flags'},
{h:'Rising Wedge (Bearish) & Falling Wedge (Bullish)',d:'<b>Rising wedge</b>: price makes higher highs and higher lows but the highs are rising FASTER than the lows — momentum is FADING. Each new high has less buying power. Eventually collapses. <b>Falling wedge</b>: opposite — each new low has less selling power. Buying pressure builds. Breaks UP.',a:'wedges'},
{h:'Head & Shoulders — Three Attempts, Buyers Exhausted',d:'<b>Left shoulder</b>: strong rally + pullback. <b>Head</b>: higher high but it fails back to the same "neckline." <b>Right shoulder</b>: weaker rally that can\'t reach the head\'s high. The story: buyers tried three times. Each time weaker. When the neckline breaks, there are NO buyers left above — gravity takes over. The measured move target = head height projected below neckline.',a:'headShoulders'},
{h:'Inverse Head & Shoulders — Three Attempts, Sellers Exhausted',d:'Mirror at bottoms. Three attempts to push lower, each weaker than the last. When neckline breaks upward, all the trapped shorts fuel the rally. Same measured move principle.',a:'invHS'},
{h:'Double Top & Double Bottom — Equal Levels as Liquidity',d:'From an SMC perspective: a <b>double top is equal highs (EQH)</b> — liquidity. Price often sweeps ABOVE the double top (triggers stops), THEN reverses. The "confirmed double top" in textbooks is often AFTER the liquidity sweep. Same for double bottoms. Understanding this means you don\'t get faked out by the "false break" that precedes the real reversal.',a:'doubleTopBot'},
{h:'Cup & Handle — Accumulation Made Visible',d:'Rounded bottom (the cup) shows sellers gradually losing power as buyers slowly build. The handle is a brief shakeout (last weak hands exit). Then breakout. The rounded shape is important — it shows <b>gradual</b> transfer of control, not sudden. More reliable than V-bottoms for continuation.',a:'cupHandle'},
{h:'Rectangle / Range — Equal Supply & Demand',d:'Price bounces between flat support and flat resistance. Neither side can gain the upper hand. Volume typically declines during the range (less interest). The breakout, when it comes, is often <b>violent</b> because all that compressed energy releases at once. Breakout + retest = entry.',a:'rectangle'}
],
quiz:[
{q:'Ascending triangle breaks up because:',o:['Resistance is weak','Buyers get more aggressive each pullback (rising lows)','It always breaks up','Volume determines direction'],a:1,e:'Rising lows = buyers getting more urgent = eventually overwhelm resistance.'},
{q:'H&S right shoulder being lower than head tells you:',o:['Buyers are getting stronger','Buyers are getting WEAKER (less power each attempt)','Its a continuation','Volume is high'],a:1,e:'Right shoulder < head = buyers are exhausting their power.'},
{q:'A bull flag is:',o:['A reversal pattern','Sharp rally → brief pullback against trend → continuation','Three peaks','A triangle'],a:1,e:'Flag = pause in a strong trend, then continuation.'},
{q:'From an SMC perspective, a double top is:',o:['Confirmed resistance','Equal highs = liquidity pool likely to be swept before reversal','Always a sell signal','Meaningless'],a:1,e:'EQH = resting orders above = sweep then reverse.'}
]},
/* ===== MODULE 9: MOVING AVERAGES & TREND INDICATORS ===== */
{id:'m9',g:'Indicators & Volume',t:'Moving Averages & Trend Indicators',b:'The most important indicators aren\'t magic lines — they\'re tools that summarize what price has already done. Used correctly, they confirm your bias and give you dynamic levels to trade from.',
topics:[
{h:'Why Use Indicators At All?',d:'Indicators are <b>derived from price</b> — they don\'t predict, they CONFIRM. Use them to: <b>1.</b> Objectively determine trend direction. <b>2.</b> Find dynamic support/resistance levels. <b>3.</b> Measure momentum strength/weakness. <b>4.</b> Identify divergences that warn of exhaustion. Never use an indicator as your sole entry reason — it confirms your price action reading.',a:null},
{h:'Simple Moving Average (SMA) — The Honest Average',d:'SMA gives <b>equal weight</b> to every price in the lookback period. A 20 SMA averages the last 20 closes. It\'s smooth and stable but SLOW to react to new information. Think of it as a calm, slow friend who only changes their mind when the evidence is overwhelming. Best for: identifying major trend direction (50 SMA, 200 SMA).',a:'sma'},
{h:'Exponential Moving Average (EMA) — The Responsive One',d:'EMA gives <b>more weight to recent prices</b>, making it faster to react. It turns sooner when trend shifts. Think of it as an alert friend who notices changes quickly — but sometimes overreacts to noise. Best for: entries and short-term trend on lower TFs. Popular EMAs: 9, 21, 50.',a:'ema'},
{h:'The 200 SMA/EMA — The Institutional Line',d:'The 200-period moving average is the <b>most-watched level on any chart</b>. Institutions use it to define "bullish" (above) vs "bearish" (below). When price approaches the 200 MA after a long time away, expect a REACTION (bounce or dramatic break). It\'s not magic — it works because everyone watches it, creating a self-fulfilling prophecy.',a:null},
{h:'MA Crossovers — Golden Cross & Death Cross',d:'<b>Golden Cross</b>: 50 MA crosses above 200 MA = long-term bullish signal. <b>Death Cross</b>: 50 crosses below 200 = bearish. These are LAGGING signals (by design — they confirm trends, not predict them). They filter out noise. If the golden cross triggers, the uptrend is likely already well underway — but it\'s confirmed.',a:'maCross'},
{h:'EMA as Dynamic Support/Resistance',d:'In a healthy uptrend, price <b>consistently bounces off the 20 or 50 EMA</b> on pullbacks. The EMA acts as a "moving floor." Traders buy the touch of the EMA, place stops below it, and ride the next leg up. When price CLOSES below the EMA it was riding, the trend may be weakening. In downtrends, the EMA acts as a ceiling (resistance on rallies).',a:'emaDynamic'},
{h:'VWAP — The Institutional Fairness Line',d:'Volume-Weighted Average Price = the average price weighted by volume. It represents the <b>"fair price"</b> that most volume traded at today. Institutions use VWAP as a benchmark — they want to execute better than VWAP. For traders: above VWAP = bullish intraday bias. Below = bearish. VWAP acts as a magnet in ranging markets and as dynamic S/R in trending ones.',a:'vwap'},
{h:'Multiple MA Strategy — Stacking',d:'Use 3 MAs: fast (9/20), medium (50), slow (200). When all three are <b>stacked in order</b> (fast on top for uptrend, fast on bottom for downtrend) = strong trend. When they squeeze together and intertwine = range/consolidation. The squeeze BEFORE a big move is your alert to watch for a breakout setup.',a:'multiMA'},
{h:'MA Ribbon — Trend Strength Visualization',d:'Plot 5-8 EMAs (8, 13, 21, 34, 55, 89). When they\'re <b>fanning out in order</b> = strong trend. When they compress into a tight band = weakening/range. When they cross and re-order = potential trend change. The ribbon gives you a VISUAL feel for trend strength that a single MA can\'t provide.',a:null}
],
quiz:[
{q:'EMA vs SMA — EMA:',o:['Weights all prices equally','Gives MORE weight to recent prices (faster reaction)','Is always better','Uses volume data'],a:1,e:'EMA emphasizes recent data, making it more responsive.'},
{q:'Golden Cross (50 above 200) means:',o:['Sell signal','Long-term bullish confirmation','Immediate buy','Nothing useful'],a:1,e:'Golden Cross confirms a bullish trend is underway.'},
{q:'VWAP represents:',o:['Highest price today','Volume-weighted average price (institutional fairness level)','The opening price','A Fibonacci level'],a:1,e:'VWAP = fair value based on where most volume occurred.'},
{q:'When multiple MAs squeeze together:',o:['Strong trend','Range/consolidation — breakout may be coming','Always bullish','Time to sell'],a:1,e:'Compressed MAs = stored energy = watch for breakout direction.'}
]},

{id:'m10',g:'Indicators & Volume',t:'Oscillators & Momentum',b:'RSI, MACD, Stochastic, Bollinger Bands, ATR — tools that measure HOW STRONG or WEAK a move is, and warn when the fuel is running out.',
topics:[
{h:'RSI — Relative Strength Index',d:'RSI measures the <b>speed and magnitude of recent price changes</b> on a 0-100 scale. Above 70 = "overbought" (extended). Below 30 = "oversold" (extended). BUT — in a strong trend, RSI can stay overbought/oversold for extended periods. Don\'t blindly fade RSI extremes in a trend. Use it for: divergence detection and confirming momentum at key levels.',a:'rsi'},
{h:'RSI Divergence — The Most Powerful RSI Signal',d:'<b>Bullish divergence</b>: price makes a LOWER LOW but RSI makes a HIGHER LOW. Translation: "Price went lower but the MOMENTUM behind the selling is weakening." <b>Bearish divergence</b>: price makes a HIGHER HIGH but RSI makes a LOWER HIGH. Translation: "Price went higher but buying power is fading." Divergence doesn\'t mean instant reversal — it means the trend is LOSING STEAM.',a:'rsiDiv'},
{h:'Stochastic RSI — Sensitivity Amplified',d:'Applies the stochastic formula to RSI values (oscillator of an oscillator). Oscillates 0-1. More sensitive than regular RSI — useful in <b>ranging markets</b> for short-term overbought/oversold signals. In trending markets it gives too many false signals. Use it with context: ranging = useful. Trending = ignore it.',a:'stochRsi'},
{h:'MACD — Momentum Direction + Strength',d:'MACD = 12 EMA minus 26 EMA (the "MACD line"). Signal line = 9 EMA of MACD. Histogram = difference between them. <b>MACD above zero</b> = bullish momentum. <b>Below zero</b> = bearish. <b>Histogram growing</b> = momentum increasing. <b>Shrinking</b> = momentum fading. Crossovers (MACD crossing signal line) = momentum shift trigger.',a:'macd'},
{h:'MACD Divergence',d:'Same principle as RSI divergence: price makes a new extreme, MACD doesn\'t confirm it. This is often MORE reliable than RSI divergence because MACD measures TWO moving averages diverging — it captures the actual momentum relationship changing. Bearish MACD divergence at resistance = high-probability short setup.',a:'macdDiv'},
{h:'Bollinger Bands — Volatility Visualization',d:'Middle band = 20 SMA. Upper/lower bands = 2 standard deviations above/below. Bands <b>expand when volatility increases</b> and <b>contract when volatility decreases</b>. The KEY signal: <b>Bollinger Squeeze</b> — when bands get extremely narrow (low volatility), a BIG move is coming. You don\'t know which direction — but you know it\'s coming. The squeeze is the setup; the breakout direction is the trigger.',a:'bollinger'},
{h:'Bollinger Band Walk',d:'In a strong trend, price doesn\'t bounce between bands — it <b>"walks" along one band</b>. Continuous closes near the upper band = strong uptrend (don\'t short just because price touches the upper band). Only when price starts closing INSIDE the bands again does the trend weaken.',a:null},
{h:'ATR — Average True Range (Volatility Ruler)',d:'ATR measures <b>how much price moves on average</b> over N periods. It doesn\'t tell direction — only magnitude. Use it for: <b>1.</b> Stop-loss sizing (1.5-2x ATR from entry = volatility-adjusted stop). <b>2.</b> Filtering trades (if ATR is very low, don\'t expect big moves). <b>3.</b> Position sizing (wider ATR = smaller position to maintain same $ risk). ATR is your volatility RULER.',a:'atr'},
{h:'CCI — Commodity Channel Index',d:'Measures how far price has deviated from its statistical average. Above +100 = abnormally strong (trend or overbought). Below -100 = abnormally weak. Zero line crossovers can signal momentum shifts. Less popular than RSI/MACD but useful as a confirmation tool, especially in commodity markets.',a:'cci'},
{h:'The Indicator Trap — Don\'t Stack 5 Confirming the Same Thing',d:'RSI, MACD, Stochastic, CCI are ALL momentum oscillators. Using 4 of them at once doesn\'t give you 4x the information — they\'re measuring the SAME thing differently. Instead: use <b>one trend tool</b> (MA), <b>one momentum tool</b> (RSI or MACD), and <b>one volatility tool</b> (BB or ATR). Three different TYPES of information.',a:null}
],
quiz:[
{q:'RSI bullish divergence means:',o:['Price HH + RSI HH (confirmation)','Price LL + RSI HL (selling momentum weakening)','RSI at 50 (neutral)','MACD crosses up'],a:1,e:'Lower low in price but higher low in RSI = bears losing power.'},
{q:'Bollinger Band squeeze signals:',o:['High volatility continuation','Low volatility → big move coming (direction unknown)','Trend reversal','Overbought condition'],a:1,e:'Compressed bands = stored energy = explosion incoming.'},
{q:'ATR is used for:',o:['Predicting price direction','Sizing stops relative to current volatility','Measuring trend direction','Finding support levels'],a:1,e:'ATR = how much price moves, not WHERE. Perfect for stops.'},
{q:'The indicator trap is:',o:['Using too few indicators','Stacking multiple indicators that all measure the SAME thing','Using any indicators at all','Only using MACD'],a:1,e:'Use one of each TYPE (trend, momentum, volatility), not 4 momentum tools.'}
]},
/* ===== MODULE 11: VOLUME ANALYSIS ===== */
{id:'m11',g:'Indicators & Volume',t:'Volume Analysis & Volume Profile',b:'Volume is the fuel behind price. Without fuel, moves stall. With it, they explode. Volume Profile shows you WHERE the real trading happened — not just when.',
topics:[
{h:'Volume = Conviction',d:'Price tells you WHERE the market went. Volume tells you <b>HOW MUCH the participants cared</b>. A big move on heavy volume = real conviction (institutions participating). A big move on LOW volume = suspicious (might be a fake move that will retrace). Always ask: "Does volume CONFIRM what price is doing?"',a:'volConfirm'},
{h:'Volume Confirmation in Trends',d:'In a healthy uptrend: <b>volume should INCREASE on the impulse legs</b> (moves with the trend) and <b>DECREASE on the pullback legs</b> (moves against the trend). This shows: institutions are pushing the trend forward and stepping back during corrections. If volume increases on pullbacks, the trend may be weakening — more participants are fighting it.',a:'volConfirm'},
{h:'Climactic Volume — Exhaustion Signal',d:'A sudden EXTREME volume spike far above average at a swing high or low often marks <b>the end of a move</b>, not the beginning. Why? Because it represents EVERYONE piling in at the same time — there\'s no one left to push further. It\'s the last gasp. Look for climactic volume + pin bar/engulfing = reversal setup.',a:'climacticVol'},
{h:'Volume Divergence — The Silent Warning',d:'Price makes a <b>new high</b> but volume on that leg is LOWER than the previous high\'s volume. Translation: "Price went higher but FEWER participants are pushing it." This is volume divergence — the crowd is thinning. The move is living on borrowed time. Same applies to new lows on decreasing volume.',a:'volDiv'},
{h:'Volume Profile — Horizontal Volume Distribution',d:'Instead of plotting volume vs TIME (traditional bars below chart), Volume Profile plots volume vs <b>PRICE</b>. It shows a horizontal histogram: which price levels attracted the most trading. This tells you WHERE the "fair value" was and where price is likely to return to. It\'s the X-ray of market interest.',a:'volProfile'},
{h:'Point of Control (POC) — The Magnet',d:'POC is the single price level with the <b>highest traded volume</b> in the profile. It represents where the market found "fairness" — where most participants agreed on value. Price tends to <b>gravitate back toward POC</b> when it drifts away. It\'s the ultimate mean-reversion magnet. Many institutional algos use POC as their target.',a:'poc'},
{h:'Value Area (VA) — The Comfort Zone',d:'The VA is the price range containing approximately <b>70% of all volume</b> in the profile. Bounded by VAH (Value Area High) and VAL (Value Area Low). When price is INSIDE the VA, it\'s in the comfort zone — range-bound, mean-reverting behavior. When price BREAKS OUTSIDE the VA, it\'s signaling a new directional move.',a:'valueArea'},
{h:'High Volume Node (HVN) — Acceptance',d:'Price levels with concentrated volume. HVNs act like <b>magnets and speed bumps</b> — price tends to slow down, consolidate, and get "stuck" at HVNs. They represent levels where the market spent significant time = accepted as fair. Use them as S/R levels.',a:'hvn'},
{h:'Low Volume Node (LVN) — Rejection',d:'Price levels with very little volume. The market moved through these levels QUICKLY — it <b>rejected</b> them as unfair. Price tends to zip through LVNs rapidly again on future visits. They act like "gaps" in the profile. Don\'t expect support/resistance at LVNs; expect fast moves through them.',a:'lvn'},
{h:'Trading the VA Edges',d:'<b>Fade strategy</b>: when price pushes to VAH or VAL and shows rejection (pin bar, engulfing), fade it back toward POC. <b>Breakout strategy</b>: when price closes decisively beyond VAH/VAL with volume, trade the continuation away from the VA. The VA gives you built-in entry triggers with clear invalidation.',a:null}
],
quiz:[
{q:'POC is:',o:['The highest price of the day','The price level with the most traded volume (market fairness)','The opening price','A Fibonacci level'],a:1,e:'POC = peak volume = where the market agreed on value.'},
{q:'Value Area contains approximately:',o:['100% of volume','~70% of total session volume','25% of volume','Only the POC'],a:1,e:'VA ≈ 70% of volume around the POC.'},
{q:'Low Volume Node means:',o:['Strong support','Price moves through QUICKLY (market rejected this price)','High institutional interest','Good entry point'],a:1,e:'LVN = little interest = price zips through, don\'t expect holding.'},
{q:'Climactic volume at a high usually means:',o:['The trend will continue forever','Exhaustion — everyone is in, nobody left to push higher','Low conviction','A gap is coming'],a:1,e:'Everyone in at once = no one left to buy = often marks the top.'}
]},

{id:'m12',g:'Indicators & Volume',t:'Fibonacci — The Market\'s Natural Rhythm',b:'Fibonacci ratios appear throughout nature and markets. Not because of magic, but because enough traders watch the same levels — creating self-fulfilling reactions.',
topics:[
{h:'Why Fibonacci Works in Markets',d:'Fibonacci levels work not because of mystical properties but because <b>millions of traders watch them</b>. When price pulls back to the 61.8% level and enough traders place buy orders there, it becomes a self-fulfilling prophecy. The level "works" because everyone expects it to work — and acts accordingly.',a:'fibRetrace'},
{h:'Fibonacci Retracement — Measuring the Pullback',d:'Draw from swing low to swing high (in an uptrend). The tool shows where price might <b>find support during a pullback</b>: 23.6% (shallow), 38.2% (moderate), 50% (halfway), 61.8% (deep), 78.6% (very deep). The deeper the retracement, the weaker the trend may be — but the better the risk:reward if it holds.',a:'fibRetrace'},
{h:'The Golden Pocket (61.8% - 78.6%)',d:'This zone is called the "golden pocket" — the <b>highest-probability retracement area</b>. Why? Because 61.8% is the "golden ratio" (most watched Fib level), and 78.6% is the square root of 61.8%. A pullback to this zone that holds = strong trend resumption with excellent R:R. If it breaks below 78.6%, the swing is likely broken.',a:'goldenPocket'},
{h:'Fibonacci Extension — Projecting Targets',d:'Extensions project where price might GO after the retracement ends: 127.2%, 161.8%, 200%, 261.8%. Use them for <b>take-profit targets</b>. The 161.8% extension is the most-watched target level. If wave 1 moved 100 points, the 161.8% extension targets 161.8 points from the retracement low.',a:'fibExt'},
{h:'Fib + Order Block = Maximum Confluence',d:'When a Fibonacci level (especially the golden pocket) <b>aligns with an order block or FVG</b>, you have a confluence that dramatically increases probability. The Fib gives you the "where" mathematically. The OB gives you the "why" structurally. Together they create institutional-grade entries.',a:'fibOB'},
{h:'Fib + S/R + Trend = Triple Confluence',d:'The highest probability Fib entries: <b>1.</b> Price is in a clear trend. <b>2.</b> A pullback reaches the golden pocket (61.8-78.6%). <b>3.</b> That zone aligns with a key support level or order block. <b>4.</b> A candlestick signal (pin bar/engulfing) forms there. This is the full stack — four layers of confluence.',a:null},
{h:'Drawing Fibs Correctly',d:'<b>Uptrend</b>: draw from swing LOW (0%) to swing HIGH (100%). Retracement levels appear BETWEEN them (below the high). <b>Downtrend</b>: draw from swing HIGH (0%) to swing LOW (100%). Retracement levels appear above the low. ALWAYS draw in the direction of the impulse you\'re measuring. Anchor points must be clear, significant swing points.',a:'drawFib'},
{h:'When Fibonacci Fails',d:'Fib levels are NOT guaranteed. They fail when: <b>1.</b> The trend has changed (you\'re drawing against a new trend). <b>2.</b> No other confluence supports the level (naked Fib = weak). <b>3.</b> The retracement breaks below 100% of the swing — meaning the entire move is invalidated. Don\'t marry a Fib level; let price confirm it holds first.',a:null}
],
quiz:[
{q:'Golden pocket is:',o:['0-23.6% zone','61.8-78.6% retracement (highest probability)','The 100% level','Only for extensions'],a:1,e:'61.8-78.6% = the golden pocket, most-watched zone.'},
{q:'Fib extension is used for:',o:['Finding pullback support','Projecting profit targets BEYOND the original swing','Drawing support zones','Volume analysis'],a:1,e:'Extensions project where price might reach after retracement.'},
{q:'Fib + Order Block at same level:',o:['Conflict (cancel out)','HIGH-probability confluence (Fib math + structural logic)','Only works in crypto','Means you should avoid the trade'],a:1,e:'Two independent reasons pointing to the same level = strong.'},
{q:'If price breaks below 78.6% retracement:',o:['The Fib level still holds','The swing is likely broken — the move may have reversed','Always buy there','No significance'],a:1,e:'Below 78.6% = the retracement has gone too deep, original trend likely failed.'}
]},
/* ===== MODULE 13: RISK MANAGEMENT ===== */
{id:'m13',g:'Risk & Psychology',t:'Risk Management — The Math That Keeps You Alive',b:'More trading careers end from poor risk management than bad entries. You can have a 40% win rate and STILL be profitable — if your risk management is disciplined. This module is the most important one.',
topics:[
{h:'Why Risk Management Comes First',d:'A 90% win rate with bad risk management will LOSE money (one blowup erases 9 wins). A 35% win rate with disciplined R:R and sizing can be very profitable. <b>Your edge isn\'t your entries — it\'s how you manage the math around them.</b> Risk management determines if you survive long enough for your edge to compound.',a:null},
{h:'Fixed Percentage Risk Per Trade',d:'Risk a fixed <b>1-2% of your account on every single trade</b>. Not 1% one day and 5% when you "feel confident." Always 1-2%. This way: if you lose 10 in a row (it happens), you\'ve lost 10-20% — painful but recoverable. If you risk 10% per trade and lose 5 in a row: 50% drawdown — nearly unrecoverable. Consistency is survival.',a:'riskPct'},
{h:'Position Sizing Formula',d:'<b>Position Size = (Account × Risk%) / Stop Distance</b>. Example: $10,000 account, 2% risk = $200 max loss. If your stop is 50 pips away, position size = $200/50 pips = $4 per pip. This ensures EVERY trade risks exactly the same dollar amount regardless of how wide or tight the stop is. Wider stop = smaller position. Tighter stop = larger position.',a:'posSizeCalc'},
{h:'Stop-Loss Placement — Structure, Not Pips',d:'Your stop belongs at the point where <b>your thesis is wrong</b>. For a long trade off an OB: stop below the OB (if price goes below, your OB thesis failed). For a pin bar: stop beyond the tail. NEVER use random fixed-pip stops (like "always 20 pips"). The market doesn\'t care about your arbitrary number — it cares about structure.',a:'stopPlace'},
{h:'Risk:Reward Ratio — The Core Math',d:'If you risk $100 per trade: <b>1:1 R:R</b> = target $100 profit. Need 50% win rate to break even. <b>1:2 R:R</b> = target $200. Need only 33% win rate. <b>1:3 R:R</b> = target $300. Need only 25% win rate. The higher your R:R, the less often you need to be right. This is why entering at deep pullbacks (better R:R) is superior to chasing.',a:'rrRatio'},
{h:'Take-Profit Strategies',d:'<b>Option 1 — Fixed target:</b> Close at next key level (most conservative). <b>Option 2 — Partial profits:</b> Close 50% at 1:1, move stop to breakeven, let rest run. <b>Option 3 — Trailing stop:</b> Move stop below each new swing low as trend progresses. The WORST option: "I\'ll just see how it goes" — that\'s not a plan, that\'s gambling.',a:'tpTargets'},
{h:'Maximum Drawdown & Losing Streaks',d:'Even a system with 55% win rate will have <b>runs of 8-12 consecutive losses</b> over 1000 trades. This is normal statistics, not failure. If you risk 2% per trade: 10 consecutive losses = 18% drawdown. Painful but recoverable. If you risk 5%: 10 losses = 40% drawdown — you now need 67% return just to get back to even. The math is cruel.',a:'maxDD'},
{h:'Portfolio Heat — Total Exposure',d:'If you have 5 trades open, each risking 2%, your total risk = 10% of your account if they ALL stop out. This is <b>"portfolio heat."</b> Cap it at 5-6% maximum. Also watch for CORRELATION: 3 long trades in correlated pairs (EUR/USD, GBP/USD, AUD/USD) is basically ONE trade x3. Diversify your risk.',a:'portHeat'},
{h:'The Recovery Math',d:'After a 10% drawdown, you need 11.1% to recover. After 20%, you need 25%. After 50%, you need 100%. After 80%, you need 400%. <b>The deeper the hole, the exponentially harder to climb out.</b> This is why preventing large drawdowns (small risk per trade) is infinitely more important than maximizing winners.',a:null},
{h:'Risk Management Rules (Non-Negotiable)',d:'<b>1.</b> Never risk more than 2% per trade. <b>2.</b> Always define stop before entry. <b>3.</b> Never move stop FURTHER from entry (only closer). <b>4.</b> Never add to a losing position. <b>5.</b> Cap portfolio heat at 6%. <b>6.</b> If drawdown reaches 10%, reduce size to 1%. <b>7.</b> If drawdown reaches 20%, STOP trading — review everything.',a:null}
],
quiz:[
{q:'With 1:3 R:R, breakeven win rate is:',o:['50%','33%','25% (only need to be right 1 in 4 trades)','75%'],a:2,e:'1/(1+3) = 25%. You only need to win 25% of the time.'},
{q:'Position size formula:',o:['Account / Price','(Account × Risk%) / Stop distance in pips','Fixed lots always','Whatever feels right'],a:1,e:'Ensures consistent dollar risk regardless of stop width.'},
{q:'After a 50% drawdown, you need to gain:',o:['50% to recover','75% to recover','100% to recover (back to breakeven)','200%'],a:2,e:'$10k → $5k loss → need $5k gain = 100% of remaining $5k.'},
{q:'Portfolio heat should be capped at:',o:['50%','25%','5-6% total simultaneous risk','No cap needed'],a:2,e:'All open positions combined should risk no more than 5-6%.'}
]},

{id:'m14',g:'Risk & Psychology',t:'Trading Psychology — The Mind Game',b:'You can have the best system in the world and still lose money if your psychology is broken. Most traders fail not because of bad analysis but because of emotional decision-making.',
topics:[
{h:'The Fear & Greed Pendulum',d:'All market psychology swings between two emotions: <b>Fear</b> (causes premature exits, missed entries, paralysis) and <b>Greed</b> (causes oversized positions, holding past targets, revenge trading). Every mistake you make traces back to one of these two. Self-awareness of which one is controlling you RIGHT NOW is the first step.',a:'fearGreed'},
{h:'FOMO — Fear of Missing Out',d:'You see price moving, you\'re not in, and you panic-enter with no setup. <b>FOMO entries almost always catch the END of a move.</b> By the time you notice something moving, the smart money that caused it is already exiting. The cure: accept that you will miss moves. There is ALWAYS another setup. The market will be here tomorrow.',a:'fomo'},
{h:'Revenge Trading — The Account Killer',d:'After a loss, the urge to immediately "win it back" with a bigger trade. This is <b>pure ego</b>, not strategy. The market doesn\'t owe you anything. Revenge trades are larger, less disciplined, and entered without proper analysis. They turn small losses into catastrophic ones. Rule: after a loss, step away for at least 30 minutes.',a:'revenge'},
{h:'Overtrading — Quantity vs Quality',d:'Taking 15 trades when your system only generates 3 valid setups. Why? Boredom, addiction to action, belief that "more trades = more profit." The reality: <b>more low-quality trades = more losses + more commissions</b>. The best traders take FEWER trades, not more. If you took 3 A+ setups per week, you\'d outperform most traders taking 30.',a:'overtrading'},
{h:'Confirmation Bias — Seeing What You Want to See',d:'You\'re long, so you only notice bullish evidence and ignore bearish warnings. Every red flag is "just noise." This is confirmation bias — your brain filters reality to match your existing belief. <b>Cure</b>: before every trade, actively argue the OPPOSITE case. If you can\'t find a reason NOT to take the trade, it\'s probably a good one.',a:'confBias'},
{h:'Loss Aversion — The Pain Asymmetry',d:'Losing $100 hurts about <b>2x more than gaining $100 feels good</b> (proven in behavioral economics). This causes: holding losers too long (avoiding the pain of realizing the loss) and cutting winners too early (locking in the pleasure of gain before it disappears). You end up with: small wins, big losses. The exact OPPOSITE of profitable trading.',a:'lossAversion'},
{h:'The Trading Journal — Your Mirror',d:'Write down: <b>1.</b> Setup (what you saw). <b>2.</b> Entry (exact price, time, reason). <b>3.</b> Stop and target (where and why). <b>4.</b> Emotional state (0-10 confidence, any FOMO/revenge?). <b>5.</b> Outcome (win/loss, R:R). <b>6.</b> Grade (did you follow rules, regardless of outcome?). Review weekly. Patterns of self-sabotage become impossible to ignore.',a:'journal'},
{h:'Process Over Outcome — The Mindset Shift',d:'A GOOD trade can lose (the market is probabilistic). A BAD trade can win (lucky). <b>Judge yourself on whether you followed your rules, not on P&L.</b> A disciplined loss on a valid setup = good trade. An undisciplined win on a revenge trade = bad trade (you just got lucky, and it reinforced bad behavior). Process > outcome.',a:'processOutcome'},
{h:'The 3 Stages of Trader Development',d:'<b>Stage 1 — Unconscious Incompetence:</b> You don\'t know what you don\'t know. Overconfident. <b>Stage 2 — Conscious Incompetence:</b> You realize how much you don\'t know. Most painful stage. Many quit here. <b>Stage 3 — Conscious Competence:</b> You know the rules and deliberately follow them. Profits become consistent. There\'s no shortcut through stages 1 and 2.',a:null}
],
quiz:[
{q:'Revenge trading typically:',o:['Improves results due to motivation','ACCELERATES drawdown (bigger, undisciplined trades)','Is a valid strategy after losses','Only affects beginners'],a:1,e:'Larger + less disciplined + emotional = faster losses.'},
{q:'Loss aversion causes:',o:['Taking profits too early + holding losers too long (BOTH)','Only cutting winners early','Only holding losers','No effect on trading'],a:0,e:'Pain asymmetry: cut winners early (lock pleasure), hold losers (avoid pain).'},
{q:'A "good trade" is one that:',o:['Made money','Followed your rules perfectly (regardless of P&L outcome)','Had a large position','Felt exciting'],a:1,e:'Process over outcome. Rules followed = good trade, even if it lost.'},
{q:'FOMO entries typically catch:',o:['The beginning of a move','The END of a move (smart money already exiting)','The perfect entry','Nothing in particular'],a:1,e:'By the time you notice a move and panic-enter, it\'s usually almost over.'}
]},
/* ===== MODULE 15: ICT / WYCKOFF / ELLIOTT ===== */
{id:'m15',g:'Smart Money & Structure',t:'ICT, Wyckoff & Elliott Wave',b:'Three advanced frameworks that attempt to model how large players move markets. Each has strengths and limitations — use them as lenses, not gospel.',
topics:[
{h:'ICT Kill Zones — When Smart Money is Active',d:'Not all hours are equal. <b>London Open (2-5am ET)</b>: highest volatility/volume for forex. <b>NY Open (7-10am ET)</b>: US institutions enter, overlap with London = peak liquidity. <b>London Close (10-12pm ET)</b>: position squaring, often reversal time. Trading outside these windows = lower probability. The kill zones are when the "real money" plays.',a:'killZones'},
