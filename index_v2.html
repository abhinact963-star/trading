<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Read The Tape — Complete Trading Field Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0E14;--surface:#11161F;--surface-2:#171F2C;--border:#232C3D;
--text:#E7EAF0;--text-dim:#8C97AC;--bull:#34D6C4;--bear:#FF6B81;
--amber:#F2B84B;--violet:#9C8CFF;--mono:'IBM Plex Mono',monospace;--sans:'Inter',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;}
a{color:var(--amber);text-decoration:none;}a:hover{text-decoration:underline;}
::selection{background:var(--amber);color:#0A0E14;}
#ticker-wrap{width:100%;height:44px;background:#070A0F;border-bottom:1px solid var(--border);overflow:hidden;}
#ticker-canvas{display:block;width:100%;height:100%;}
.hero{max-width:1180px;margin:0 auto;padding:60px 28px 36px;display:grid;grid-template-columns:1.3fr .7fr;gap:44px;align-items:end;}
@media(max-width:860px){.hero{grid-template-columns:1fr;padding:36px 20px 24px;}}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--bull);margin:0 0 12px;}
h1.title{font-family:var(--mono);font-weight:700;font-size:clamp(32px,5vw,54px);line-height:1.05;margin:0 0 16px;}
h1.title .accent{color:var(--amber);}
.lede{font-size:16px;color:var(--text-dim);max-width:560px;margin:0 0 24px;}
.cta-row{display:flex;gap:12px;flex-wrap:wrap;}
.btn{font-family:var(--mono);font-size:12px;font-weight:600;padding:12px 20px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:border-color .15s;display:inline-block;}
.btn:hover{border-color:var(--amber);}.btn.primary{background:var(--amber);color:#0A0E14;border-color:var(--amber);}
.pips-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 22px;}
.pips-card .lbl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--text-dim);}
.pips-card .val{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--bull);margin:4px 0 8px;}
.pips-card .bar{height:5px;border-radius:3px;background:var(--surface-2);overflow:hidden;}
.pips-card .bar-fill{height:100%;background:linear-gradient(90deg,var(--bull),var(--amber));width:0%;transition:width .5s;}
.pips-card .sub{font-size:11px;color:var(--text-dim);margin-top:6px;}
.map-row{max-width:1180px;margin:0 auto;padding:0 28px 30px;display:flex;gap:7px;flex-wrap:wrap;}
.pill{font-family:var(--mono);font-size:11px;padding:6px 12px;border-radius:999px;border:1px solid var(--border);color:var(--text-dim);background:var(--surface);cursor:pointer;}
.pill:hover{color:var(--text);border-color:var(--text-dim);}.pill.new::after{content:" new";color:var(--violet);font-size:9px;}
</style>
<style>
.workspace{max-width:1180px;margin:0 auto;padding:0 28px 80px;display:grid;grid-template-columns:250px 1fr;gap:24px;}
@media(max-width:860px){.workspace{grid-template-columns:1fr;padding:0 16px 60px;}}
aside.nav{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px;align-self:start;position:sticky;top:16px;max-height:calc(100vh - 32px);overflow-y:auto;font-size:13px;}
@media(max-width:860px){aside.nav{position:static;max-height:none;}}
.ng{margin-bottom:2px;}.ng-t{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);padding:10px 9px 4px;}
.ni{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border-radius:5px;cursor:pointer;color:var(--text-dim);}
.ni:hover{background:var(--surface-2);color:var(--text);}.ni.active{background:var(--surface-2);color:var(--text);box-shadow:inset 2px 0 0 var(--amber);}
.ni .ck{font-family:var(--mono);font-size:10px;color:var(--bull);opacity:0;}.ni.done .ck{opacity:1;}
main.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:32px 34px;min-height:500px;}
@media(max-width:600px){main.panel{padding:20px 16px;}}
.mk{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}.mk.new{color:var(--violet);}
h2.mt{font-family:var(--mono);font-size:26px;margin:0 0 8px;font-weight:700;}
p.mb{color:var(--text-dim);font-size:14px;max-width:680px;margin:0 0 26px;}
.tc{border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:12px;background:var(--bg);}
.tc h3{font-size:14px;margin:0 0 6px;font-weight:700;}.tc p,.tc li{font-size:13.5px;color:var(--text-dim);line-height:1.65;}.tc ul{margin:6px 0 0;padding-left:18px;}.tc li{margin-bottom:3px;}
.tag{display:inline-block;font-family:var(--mono);font-size:9px;color:var(--bull);border:1px solid var(--bull);border-radius:4px;padding:1px 5px;margin-right:5px;}.tag.bear{color:var(--bear);border-color:var(--bear);}
.as{border:1px solid var(--border);border-radius:7px;background:#070A0F;margin:10px 0 14px;padding:12px;}
.as .at{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;}
.as canvas{display:block;width:100%;height:auto;max-width:520px;}
.ac{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:center;}
.ac label{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:4px;}.ac input[type=range]{width:90px;}.ac input[type=checkbox]{accent-color:var(--amber);}
.ar{font-family:var(--mono);font-size:11px;color:var(--amber);}
.qb{border:1px solid var(--border);border-radius:8px;padding:20px 22px;margin-top:28px;background:var(--bg);}
.qb h3{font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin:0 0 14px;color:var(--text-dim);}
.qq{margin-bottom:20px;}.qq .qt{font-size:14px;margin-bottom:8px;font-weight:600;}
.qo{display:flex;flex-direction:column;gap:5px;}
.qp{text-align:left;padding:9px 13px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;font-family:var(--sans);}
.qp:hover{border-color:var(--text-dim);}.qp.ok{border-color:var(--bull);background:rgba(52,214,196,.08);}.qp.no{border-color:var(--bear);background:rgba(255,107,129,.08);}
.qp:disabled{cursor:default;}.qe{font-size:12px;color:var(--text-dim);margin-top:6px;display:none;}.qe.show{display:block;}
.qs{font-family:var(--mono);font-size:12px;color:var(--amber);border-top:1px solid var(--border);padding-top:12px;margin-top:4px;}
.mfn{display:flex;justify-content:space-between;margin-top:30px;border-top:1px solid var(--border);padding-top:18px;}
footer{text-align:center;color:var(--text-dim);font-size:11px;padding:28px 20px 44px;font-family:var(--mono);}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>

</div><div class="pips-card"><div class="lbl">Progress</div><div class="val" id="pV">0</div><div class="bar"><div class="bar-fill" id="pB"></div></div><div class="sub" id="pS">0 / 17</div></div></section>

<script>
const S={cur:null,pts:0,done:new Set()};
try{const d=JSON.parse(localStorage.getItem('rtt2'));if(d){S.pts=d.p||0;(d.d||[]).forEach(x=>S.done.add(x));}}catch(e){}
function save(){localStorage.setItem('rtt2',JSON.stringify({p:S.pts,d:[...S.done]}));}
function mc(el,w,h){const c=document.createElement('canvas');c.width=w*2;c.height=h*2;c.style.width='100%';c.style.maxWidth=w+'px';c.style.height='auto';c.style.display='block';const x=c.getContext('2d');x.scale(2,2);el.appendChild(c);return{c,x,W:w,H:h};}

/* ===================== MODULE DATA ===================== */
const M=[
/* ===== MODULE 1: TRADING FUNDAMENTALS ===== */
{id:'m1',g:'Foundations',t:'Trading Fundamentals',b:'Markets, participants, order types, and the vocabulary everything builds on.',
topics:[
{h:'What is Trading',d:'Buying/selling assets to profit from price changes. Distinct from investing (longer horizon, ownership focus).',a:'whatIsTrade'},
{h:'Bid, Ask & Spread',d:'<b>Bid</b> = highest buyer price. <b>Ask</b> = lowest seller price. <b>Spread</b> = cost of immediacy.',a:'orderbook'},
{h:'Market Orders vs Limit Orders',d:'<b>Market order</b> = fill immediately at best available. <b>Limit order</b> = fill only at your price or better. Market orders consume liquidity; limit orders provide it.',a:'orderTypes'},
{h:'Leverage & Margin',d:'Leverage amplifies both gains and losses. Margin = collateral. 10x leverage on a 5% move = 50% P&L swing.',a:'leverage'},
{h:'Types of Traders',d:'<b>Scalper</b> (seconds-minutes), <b>Day trader</b> (same session), <b>Swing</b> (days-weeks), <b>Position</b> (weeks-months).',a:null},
{h:'Long vs Short',d:'<b>Long</b> = profit from price rising. <b>Short</b> = profit from price falling (borrow, sell, buy back cheaper).',a:'longShort'},
{h:'Timeframes',d:'Each candle represents a period: 1m, 5m, 15m, 1H, 4H, Daily, Weekly. Higher timeframes carry more weight.',a:'timeframes'},
{h:'Market Sessions',d:'<b>Asian</b> (low vol), <b>London</b> (most vol), <b>New York</b> (overlap = peak). Crypto: 24/7 but still has rhythm.',a:'sessions'}
],
quiz:[
{q:'A market order:',o:['Waits for a specific price','Fills immediately at best available','Is always better than a limit order','Cannot be used for selling'],a:1,e:'Market orders fill instantly at best price.'},
{q:'10x leverage on a 3% move means:',o:['3% P&L','30% P&L','0.3% P&L','300% P&L'],a:1,e:'Leverage multiplies the move: 10 × 3% = 30%.'},
{q:'The spread represents:',o:['Daily profit','Cost of immediate execution','Exchange fees only','Leverage ratio'],a:1,e:'Spread = gap between bid and ask = cost of immediacy.'},
{q:'London session is known for:',o:['Lowest volume','Highest volume/volatility','Only crypto trading','No institutional activity'],a:1,e:'London open brings the most liquidity and movement.'}
]},
/* ===== MODULE 2: CANDLESTICK BASICS ===== */
{id:'m2',g:'Foundations',t:'Candlestick Basics',b:'OHLC anatomy, timeframe meaning, and reading the story each candle tells.',
topics:[
{h:'OHLC Anatomy',d:'Open, High, Low, Close. Body = O-to-C. Upper wick = rejection above. Lower wick = rejection below.',a:'ohlc'},
{h:'Bull vs Bear Candles',d:'Close > Open = bullish (teal). Close < Open = bearish (coral). Body size = conviction.',a:'bullBear'},
{h:'Wick Psychology',d:'Long upper wick = sellers rejected buyers. Long lower wick = buyers rejected sellers. Both = indecision.',a:'wicks'},
{h:'Body Size & Momentum',d:'Large body = strong momentum. Small body = weak momentum or exhaustion. Marubozu = no wicks, pure conviction.',a:'bodySize'},
{h:'Doji Candles',d:'Open ≈ Close. Variants: standard doji, dragonfly (long lower), gravestone (long upper), long-legged.',a:'doji'},
{h:'Candle vs Line Chart',d:'Line shows only close. Candle shows the entire intra-period battle — rejection, absorption, conviction.',a:'candleVsLine'},
{h:'Timeframe Context',d:'Same price action looks different on 5m vs 4H. Higher TF candles override lower TF signals.',a:'tfContext'}
],
quiz:[
{q:'A candle body shows:',o:['High to Low','Open to Close','Previous close to current open','Volume'],a:1,e:'Body = range from open to close.'},
{q:'A long lower wick means:',o:['Sellers dominated','Buyers pushed price back up from lows','No trading occurred','Price gapped down'],a:1,e:'Price went low but buyers pushed it back = lower wick.'},
{q:'A Marubozu candle has:',o:['Equal wicks','No wicks at all','Only upper wick','Doji shape'],a:1,e:'Marubozu = full conviction, no wicks.'},
{q:'Doji signals:',o:['Strong trend','Pure indecision (open ≈ close)','Guaranteed reversal','High volume'],a:1,e:'Open ≈ close = neither side won.'}
]},
/* ===== MODULE 3: CANDLESTICK PATTERNS ===== */
{id:'m3',g:'Price Action',t:'Candlestick Patterns',b:'Single, double, and triple-candle patterns — reversals and continuations.',
topics:[
{h:'Hammer & Inverted Hammer',d:'<b>Hammer</b>: small body top, long lower wick, after downtrend = bullish reversal. <b>Inverted</b>: long upper wick.',a:'hammer'},
{h:'Shooting Star & Hanging Man',d:'<b>Shooting Star</b>: long upper wick after uptrend = bearish. <b>Hanging Man</b>: hammer shape at a top.',a:'shootingStar'},
{h:'Bullish & Bearish Engulfing',d:'Current candle body fully engulfs previous. Bullish: bull engulfs bear after downtrend. Bearish: bear engulfs bull.',a:'engulfing'},
{h:'Morning Star & Evening Star',d:'Three-candle reversal. Morning Star (bottom): bear → small body → bull. Evening Star (top): bull → small → bear.',a:'stars'},
{h:'Piercing Pattern & Dark Cloud Cover',d:'<b>Piercing</b>: bull opens below prior close, closes above 50% of prior bear. <b>Dark Cloud</b>: mirror.',a:'piercing'},
{h:'Three White Soldiers & Three Black Crows',d:'Three consecutive strong directional candles with minimal wicks = powerful continuation/reversal.',a:'threeSoldiers'},
{h:'Spinning Top & Doji Variations',d:'Small body, wicks both sides = indecision. Four doji types: standard, dragonfly, gravestone, long-legged.',a:'spinTop'},
{h:'Tweezers Top & Bottom',d:'Two candles with matching highs (top) or matching lows (bottom) at S/R = reversal signal.',a:'tweezers'}
],
quiz:[
{q:'Hammer after downtrend signals:',o:['Continuation down','Potential bullish reversal','Indecision','Short entry'],a:1,e:'Hammer = buyers rejected lows = potential reversal.'},
{q:'Engulfing pattern requires:',o:['Matching wicks','Current body fully covers prior body','Three candles','A gap'],a:1,e:'Full body engulfment of previous candle.'},
{q:'Evening Star is:',o:['Bullish reversal','Bearish three-candle reversal at a top','Continuation','Single candle pattern'],a:1,e:'Evening Star: bull → indecision → bear at a high.'},
{q:'Three Black Crows after an uptrend:',o:['Bullish continuation','Strong bearish reversal signal','Neutral','Needs 5 more candles'],a:1,e:'Three strong bear candles = selling pressure overwhelming.'}
]},

/* ===== MODULE 4: SUPPORT & RESISTANCE ===== */
{id:'m4',g:'Price Action',t:'Support & Resistance',b:'Horizontal levels, dynamic levels, role reversal, and how to draw them properly.',
topics:[
{h:'Horizontal Support',d:'Price level where buying repeatedly halted declines. More touches without breaking = stronger.',a:'hSupport'},
{h:'Horizontal Resistance',d:'Price level where selling repeatedly halted advances. Mirror of support.',a:'hResist'},
{h:'Drawing S/R Zones (not lines)',d:'Use zones, not exact lines. Wicks define the "zone width." Look for multiple reactions at similar prices.',a:'srZones'},
{h:'Dynamic S/R (Moving Averages)',d:'MAs like 20 EMA, 50 SMA, 200 SMA act as dynamic support/resistance that moves with price.',a:'dynamicSR'},
{h:'Trendline Support & Resistance',d:'Connecting swing lows (support) or highs (resistance) with a diagonal line. Valid with 3+ touches.',a:'trendlineSR'},
{h:'Role Reversal (Flip)',d:'Broken resistance becomes support on retest. Broken support becomes resistance. Traders buy the retest.',a:'roleReversal'},
{h:'Round Numbers & Psychological Levels',d:'100, 500, 1000, 50000 — round numbers attract orders. They act as invisible S/R.',a:'roundNums'},
{h:'Multi-Timeframe S/R',d:'Daily/weekly S/R overrules 1H/15m. Always check higher TF levels before trading lower TF setups.',a:'mtfSR'}
],
quiz:[
{q:'S/R zones vs lines:',o:['Lines are more accurate','Zones account for wicks and slight variations','Zones only work weekly','No difference'],a:1,e:'Zones are more practical — price rarely respects exact lines.'},
{q:'Role reversal means:',o:['Support becomes resistance after breakdown','Support stays support forever','Only works in forex','A candlestick pattern'],a:0,e:'Broken level flips its role on retest.'},
{q:'200 SMA is considered:',o:['Irrelevant','Major dynamic S/R watched by institutions','Only for scalping','A volume indicator'],a:1,e:'200 SMA is one of the most-watched dynamic levels.'},
{q:'Higher timeframe S/R:',o:['Is weaker than lower TF','Overrules lower TF signals','Only matters for swing trading','Is invisible'],a:1,e:'Higher TF levels carry more weight.'}
]},
/* ===== MODULE 5: TREND ANALYSIS ===== */
{id:'m5',g:'Price Action',t:'Trend Analysis',b:'HH/HL, LH/LL, trendlines, moving averages for trend identification, and ranging markets.',
topics:[
{h:'Uptrend: HH + HL',d:'Each high is higher than the last. Each pullback holds above the previous low. Buyers in control.',a:'uptrend'},
{h:'Downtrend: LH + LL',d:'Each high fails lower. Each low breaks further down. Sellers in control.',a:'downtrend'},
{h:'Sideways / Range',d:'Highs and lows oscillate in a band. No directional progression. Wait for breakout or trade the range.',a:'range'},
{h:'Trend Identification with MAs',d:'Price above 20/50 EMA = bullish bias. Below = bearish. EMAs stacked (20>50>200) = strong trend.',a:'maTrend'},
{h:'Drawing Trendlines',d:'Connect 2+ swing lows (uptrend) or highs (downtrend). Third touch = confirmation. Break = potential reversal.',a:'drawTrendline'},
{h:'Channels (Parallel)',d:'Two parallel trendlines. Ascending channel: rising support + rising resistance. Descending: falling both.',a:'channels'},
{h:'Trend Exhaustion Signs',d:'Decreasing momentum: smaller candle bodies, divergence with RSI, volume drying up on new highs/lows.',a:'exhaustion'},
{h:'Multi-Timeframe Trend',d:'HTF trend > LTF trend. Trade with the higher timeframe direction. LTF gives entry timing within HTF trend.',a:'mtfTrend'}
],
quiz:[
{q:'An uptrend requires:',o:['Lower lows','Higher highs AND higher lows','Only higher highs','Random oscillation'],a:1,e:'Both HH and HL must be present for uptrend.'},
{q:'EMAs stacked 20>50>200 with price above all:',o:['Bearish','Strong bullish trend','Ranging','Indeterminate'],a:1,e:'Stacked EMAs confirm strong trend direction.'},
{q:'Third touch of a trendline:',o:['Invalidates it','Confirms validity','Means it will break','Is irrelevant'],a:1,e:'More touches = more confirmed/respected.'},
{q:'Trend exhaustion shows:',o:['Bigger candles','Smaller bodies, divergence, volume decay','More momentum','Higher volume'],a:1,e:'Signs of weakening participation.'}
]},

/* ===== MODULE 6: MARKET STRUCTURE (COMPREHENSIVE SMC) ===== */
{id:'m6',g:'Smart Money & Structure',t:'Market Structure — SMC/ICT',b:'The complete SMC framework: swing structure, BOS, CHoCH, MSS, FVGs, order blocks, liquidity, and advanced concepts.',
topics:[
{h:'Swing High & Swing Low',d:'A <b>swing high</b> has lower highs on both sides. A <b>swing low</b> has higher lows on both sides. Foundation of all structure.',a:'swingHL'},
{h:'Higher High (HH) & Higher Low (HL)',d:'Bullish structure: each peak exceeds prior peak, each dip holds above prior dip.',a:'hhhl'},
{h:'Lower High (LH) & Lower Low (LL)',d:'Bearish structure: each rally fails below prior rally, each dip breaks below prior dip.',a:'lhll'},
{h:'Break of Structure (BOS)',d:'Price closes beyond a prior swing point IN the trend direction. Confirms trend continuation.',a:'bos'},
{h:'Change of Character (CHoCH)',d:'First break AGAINST the prevailing trend. Breaks the most recent HL (in uptrend) or LH (in downtrend). Warning sign.',a:'choch'},
{h:'Market Structure Shift (MSS)',d:'More decisive than CHoCH — confirms actual reversal with new opposing structure forming after the break.',a:'mss'},
{h:'Fair Value Gap (FVG)',d:'Three-candle imbalance: candle 1 wick and candle 3 wick dont overlap — the gap between them is the FVG. Price often returns to fill it.',a:'fvg'},
{h:'Imbalance (IMB) & Inefficiency',d:'Any area where price moved too fast for fair two-sided trading. FVGs are a specific type. Price seeks to "rebalance" these areas.',a:'imbalance'},
{h:'Bullish Order Block',d:'The last bearish candle before a strong bullish impulse. Marks where institutional buy orders likely accumulated.',a:'bullOB'},
{h:'Bearish Order Block',d:'The last bullish candle before a strong bearish impulse. Where institutions likely placed sell orders.',a:'bearOB'},
{h:'Breaker Block',d:'An order block that failed (price went through it) — it now acts as S/R in the opposite direction.',a:'breaker'},
{h:'Mitigation Block',d:'Where price returns to partially fill unfilled orders before continuing. Old failed OB that now gets "mitigated."',a:'mitigation'},
{h:'Rejection Block',d:'A candle with a long wick showing strong rejection. The wick zone acts as future S/R.',a:'rejection'},
{h:'Buy-Side Liquidity (BSL)',d:'Resting above old highs: stop-losses of shorts + breakout buy orders. Smart money targets these pools.',a:'bsl'},
{h:'Sell-Side Liquidity (SSL)',d:'Resting below old lows: stop-losses of longs + breakout sell orders. Target for bearish raids.',a:'ssl'},
{h:'Internal Range Liquidity (IRL)',d:'Liquidity inside a range — FVGs, order blocks within the move. Price fills these before continuing.',a:'irl'},
{h:'External Range Liquidity (ERL)',d:'Liquidity at the extremes of a range — the swing highs/lows themselves. Price targets ERL after filling IRL.',a:'erl'},
{h:'Equal Highs (EQH) & Equal Lows (EQL)',d:'Two or more highs/lows at the same price = obvious liquidity pool. Highly likely to be swept.',a:'eqhl'},
{h:'Liquidity Sweep / Grab',d:'Price spikes through a level to trigger stops, then immediately reverses. The "hunt" is complete.',a:'sweep'},
{h:'Stop Hunt',d:'Deliberate push past obvious S/R to trigger retail stops. Then the real move begins in the opposite direction.',a:'stopHunt'},
{h:'Premium Zone',d:'Upper half of a range (above equilibrium). In premium, price is "expensive" — look for sells/shorts.',a:'premium'},
{h:'Discount Zone',d:'Lower half of a range (below equilibrium). In discount, price is "cheap" — look for buys/longs.',a:'discount'},
{h:'Equilibrium (50% Level)',d:'The exact midpoint of a range. Divides premium from discount. Often acts as a magnet.',a:'equilibrium'},
{h:'Displacement',d:'A large, fast candle (or sequence) that shows genuine institutional intent. Validates direction of the move.',a:'displacement'},
{h:'Inducement',d:'A small, engineered move to lure retail traders into the wrong side before the real move. Creates liquidity to be swept.',a:'inducement'},
{h:'Power of 3 (PO3)',d:'Daily cycle: <b>Accumulation</b> (Asian session) → <b>Manipulation</b> (false move at London open) → <b>Distribution</b> (real move NY session).',a:'po3'},
{h:'Accumulation & Distribution',d:'<b>Accumulation</b>: large players building position in a range. <b>Distribution</b>: unwinding position. Both look like ranges.',a:'accumDist'},
{h:'Expansion & Contraction',d:'<b>Expansion</b>: range breakout, trending. <b>Contraction</b>: volatility shrinks, range forms. Markets cycle between both.',a:'expContract'},
{h:'Timeframe Alignment',d:'Setup is strongest when multiple timeframes agree: HTF trend + MTF structure + LTF entry all pointing same direction.',a:'tfAlign'}
],
quiz:[

/* ===== MODULE 7-9: SUPPLY/DEMAND, CHART PATTERNS ===== */
{id:'m7',g:'Smart Money & Structure',t:'Supply & Demand Zones',b:'Where institutional orders cluster — identifying fresh zones, retests, and invalidation.',
topics:[
{h:'Demand Zone',d:'Base of a strong rally. Buyers overwhelmed sellers here. Fresh zone = not retested yet.',a:'demandZone'},
{h:'Supply Zone',d:'Origin of a strong decline. Sellers overwhelmed buyers. Fresh = higher probability.',a:'supplyZone'},
{h:'Rally-Base-Rally (RBR)',d:'Continuation demand: price rallies, pauses briefly (base), then rallies again. The base = demand zone.',a:'rbr'},
{h:'Drop-Base-Drop (DBD)',d:'Continuation supply: price drops, pauses, drops again. The base = supply zone.',a:'dbd'},
{h:'Rally-Base-Drop (RBD)',d:'Reversal supply: price rallied, based, then dropped hard. Base = supply zone where sellers took over.',a:'rbd'},
{h:'Drop-Base-Rally (DBR)',d:'Reversal demand: price dropped, based, then rallied hard. Base = demand zone where buyers took over.',a:'dbr'},
{h:'Zone Freshness',d:'A zone is "fresh" if price hasnt returned to it since formation. Fresh zones have unfilled orders waiting.',a:'freshness'},
{h:'Zone Invalidation',d:'If price closes cleanly through a zone, it is invalidated — orders were absorbed or pulled.',a:'zoneInvalid'},
{h:'Nested / Refined Zones',d:'Zoom into a lower timeframe to refine the exact OB or candle within a broader zone for a tighter entry.',a:'nestedZone'}
],
quiz:[

{q:'RBD stands for:',o:['Rally-Base-Drop (supply)','Reject-Break-Dive','Resistance-Breakout-Dip','None'],a:0,e:'Rally, Base, then Drop = supply zone formation.'},
{q:'Zone invalidation happens when:',o:['Price touches the zone','Price closes cleanly through it','Volume drops','A doji forms at the zone'],a:1,e:'Clean close through = orders absorbed, zone dead.'}
]},

{id:'m8',g:'Price Action',t:'Chart Patterns',b:'Classic geometry: triangles, flags, wedges, head & shoulders, double tops/bottoms.',
topics:[
{h:'Ascending Triangle',d:'Flat resistance + rising lows. Buyers increasingly aggressive. Usually breaks up.',a:'ascTriangle'},
{h:'Descending Triangle',d:'Flat support + falling highs. Sellers pressing. Usually breaks down.',a:'descTriangle'},
{h:'Symmetrical Triangle',d:'Converging trendlines, neutral. Breaks either way — trade the breakout direction.',a:'symTriangle'},
{h:'Bull Flag & Bear Flag',d:'Sharp move → tight consolidation against it → continuation. Flag pole = impulse, flag = pullback.',a:'flags'},
{h:'Rising & Falling Wedge',d:'Rising wedge (bearish): converging up. Falling wedge (bullish): converging down. Counter-trend patterns.',a:'wedges'},
{h:'Head & Shoulders',d:'Three peaks, middle tallest. Neckline connects the two troughs. Break of neckline = bearish reversal confirmed.',a:'headShoulders'},
{h:'Inverse Head & Shoulders',d:'Three troughs, middle deepest. Neckline break = bullish reversal. Mirror of regular H&S.',a:'invHS'},
{h:'Double Top & Double Bottom',d:'Two peaks at same level (DT = bearish) or two troughs (DB = bullish). Neckline break confirms.',a:'doubleTopBot'},
{h:'Cup & Handle',d:'Rounded bottom (cup) + small pullback (handle) → breakout. Bullish continuation pattern.',a:'cupHandle'},
{h:'Rectangle / Range',d:'Price bounces between flat support and flat resistance. Breakout direction determines the trade.',a:'rectangle'}
],
quiz:[
{q:'Ascending triangle usually:',o:['Breaks down','Breaks up (buyers aggressive)','Is neutral','Requires volume divergence'],a:1,e:'Rising lows vs flat resistance = bullish pressure.'},
{q:'Head & Shoulders neckline break:',o:['Bullish signal','Confirms bearish reversal','Is meaningless','Only works weekly'],a:1,e:'Neckline break confirms the topping pattern.'},
{q:'A bull flag is:',o:['Sharp move up → tight pullback → continuation up','Three peaks','A reversal pattern','Flat range'],a:0,e:'Impulse → consolidation → continuation.'},
{q:'Falling wedge is:',o:['Bearish','Bullish (converging down then breaking up)','Neutral','A single candle'],a:1,e:'Falling wedge = bullish reversal/continuation.'}
]},
/* ===== MODULE 9-10: INDICATORS ===== */
{id:'m9',g:'Indicators & Volume',t:'Moving Averages & Trend Indicators',b:'SMA, EMA, MA crossovers, VWAP — trend identification and dynamic S/R.',
topics:[
{h:'Simple Moving Average (SMA)',d:'Average of N closing prices. Equal weight. Smoother but slower to react. Common: 20, 50, 200.',a:'sma'},
{h:'Exponential Moving Average (EMA)',d:'More weight on recent prices. Reacts faster. Popular: 9, 21, 50 EMA for entries/trend.',a:'ema'},
{h:'MA Crossover (Golden/Death Cross)',d:'<b>Golden Cross</b>: 50 crosses above 200 = bullish. <b>Death Cross</b>: 50 below 200 = bearish. Lagging but powerful.',a:'maCross'},
{h:'EMA as Dynamic S/R',d:'In uptrend, 20 EMA acts as pullback support. In downtrend, 20 EMA = resistance. Price "rides" the EMA.',a:'emaDynamic'},
{h:'VWAP (Volume-Weighted Average Price)',d:'Average price weighted by volume. Institutional benchmark. Above VWAP = bullish bias. Below = bearish.',a:'vwap'},
{h:'Multiple MA Strategy',d:'Use 3 MAs (fast/medium/slow). All stacked in order = strong trend. Squeeze together = range/breakout coming.',a:'multiMA'}
],
quiz:[

{q:'Golden Cross is:',o:['50 MA crossing below 200','50 MA crossing above 200 (bullish)','RSI above 70','MACD histogram positive'],a:1,e:'50 above 200 = Golden Cross = bullish.'},
{q:'VWAP represents:',o:['Highest volume price','Average price weighted by volume (fairness)','The 50% fib level','Opening price'],a:1,e:'VWAP = volume-weighted average = fair value line.'}
]},

{id:'m10',g:'Indicators & Volume',t:'Oscillators & Momentum',b:'RSI, Stochastic, MACD, CCI — measuring overbought/oversold and divergence.',
topics:[
{h:'RSI (Relative Strength Index)',d:'0-100 oscillator. >70 overbought, <30 oversold. Measures speed of gains vs losses over N periods.',a:'rsi'},
{h:'RSI Divergence',d:'<b>Bullish div</b>: price makes lower low, RSI makes higher low. <b>Bearish div</b>: price HH, RSI LH. Warns of reversal.',a:'rsiDiv'},
{h:'Stochastic RSI',d:'RSI of RSI — even more sensitive. Oscillates 0-1. Useful for oversold/overbought in ranging markets.',a:'stochRsi'},
{h:'MACD (Moving Average Convergence Divergence)',d:'Difference between 12 EMA and 26 EMA + 9 EMA signal line. Cross above signal = bullish. Histogram shows momentum.',a:'macd'},
{h:'MACD Divergence',d:'Same concept as RSI divergence but using MACD. Price new extreme vs MACD not confirming = weakening trend.',a:'macdDiv'},
{h:'Bollinger Bands',d:'20 SMA ± 2 standard deviations. Bands expand in volatility, squeeze in consolidation. Squeeze → expansion.',a:'bollinger'},
{h:'ATR (Average True Range)',d:'Measures volatility (not direction). Higher ATR = more volatile. Used for stop-loss sizing and filtering.',a:'atr'},

{q:'Bollinger Band squeeze means:',o:['High volatility','Low volatility → expansion likely coming','Trend is over','RSI is overbought'],a:1,e:'Squeeze = coiling energy → breakout expected.'},
{q:'ATR is used for:',o:['Predicting direction','Sizing stops relative to volatility','Measuring trend','Finding divergence'],a:1,e:'ATR = volatility measure, not directional.'},
{q:'MACD signal line crossover:',o:['MACD crosses above signal = bullish','Signal crosses above MACD = bullish','Both mean the same','Neither is useful'],a:0,e:'MACD line above signal = bullish momentum.'}

{h:'Climactic Volume',d:'Extreme volume spike at a high/low often marks exhaustion — the last gasp of the move. Look for reversals after.',a:'climacticVol'},
{h:'Volume Divergence',d:'Price makes new high but volume decreases = bearish divergence. New low + decreasing vol = bullish divergence.',a:'volDiv'},
{h:'Volume Profile',d:'Volume plotted against PRICE (not time). Shows where most trading occurred. Bell-curve shape typical.',a:'volProfile'},

/* ===== MODULE 13-14: RISK & PSYCHOLOGY ===== */
{id:'m13',g:'Risk & Psychology',t:'Risk Management',b:'Position sizing, R:R, drawdown, and the math that keeps you alive.',
topics:[
{h:'Risk Per Trade (%)',d:'Risk a fixed % of account per trade (1-2%). Account grows? Position grows. Account shrinks? Position shrinks. Proportional.',a:'riskPct'},
{h:'Stop-Loss Placement',d:'Place stops at logical invalidation points (below OB, above supply zone, beyond structure). Never arbitrary.',a:'stopPlace'},
{h:'Take-Profit & Targets',d:'Set targets at opposing liquidity, next S/R, or Fibonacci extensions. Have a plan before entry.',a:'tpTargets'},
{h:'Risk:Reward Ratio',d:'Risk 1 to make 2 (1:2 R:R) or better. With 1:3 R:R, you only need 25% win rate to profit.',a:'rrRatio'},
{h:'Position Sizing Calculator',d:'Position size = (Account × Risk%) / Stop distance. Ensures every trade risks the same $ amount.',a:'posSizeCalc'},
{h:'Maximum Drawdown',d:'Largest peak-to-trough decline. Even with 2% risk, 10 losses in a row = 18% drawdown. Plan for streaks.',a:'maxDD'},
{h:'Portfolio Heat',d:'Total risk across ALL open positions simultaneously. Cap at 5-6% total. Correlated trades = hidden concentration.',a:'portHeat'},

{q:'Portfolio heat should be capped at:',o:['50%','25%','5-6% total open risk','100%'],a:2,e:'Total simultaneous risk = portfolio heat, keep it low.'}
]},

{id:'m14',g:'Risk & Psychology',t:'Trading Psychology',b:'The mental game: cognitive biases, emotional traps, and discipline systems.',
topics:[
{h:'Fear & Greed Cycle',d:'Fear: premature exits, missed setups. Greed: oversized, holding past targets, ignoring stop-losses.',a:'fearGreed'},
{h:'FOMO (Fear of Missing Out)',d:'Entering because price is moving, not because setup is valid. Usually catches the end of a move.',a:'fomo'},
{h:'Revenge Trading',d:'After a loss, taking a bigger undisciplined trade to "win it back." Accelerates drawdown.',a:'revenge'},
{h:'Overtrading',d:'Taking way more trades than the strategy calls for. Boredom, ego, or FOMO-driven. Quality > quantity.',a:'overtrading'},
{h:'Confirmation Bias',d:'Only seeing evidence that supports your existing position. Ignoring red flags. Deadly for objective analysis.',a:'confBias'},
{h:'Loss Aversion',d:'Pain of losing $100 feels 2x worse than joy of gaining $100. Leads to holding losers, cutting winners early.',a:'lossAversion'},
{h:'Trading Journal',d:'Record every trade: entry reason, exit, emotions, grade. Patterns of self-sabotage become visible over time.',a:'journal'},
{h:'Process Over Outcome',d:'A good trade can lose. A bad trade can win. Judge yourself on whether you followed your rules, not P&L.',a:'processOutcome'}
],

{q:'Loss aversion causes:',o:['Taking profits too early','Holding losers too long (avoiding pain of realizing loss)','Both A and B','Neither'],a:2,e:'Both: cut winners short, let losers run.'},
{q:'Trading journal helps by:',o:['Guaranteeing wins','Making behavioral patterns visible over time','Replacing a strategy','Calculating taxes only'],a:1,e:'Patterns of self-sabotage surface in review.'}
]},
/* ===== MODULE 15: ICT / WYCKOFF / ELLIOTT ===== */

{h:'Wyckoff Accumulation Schematic',d:'Phase A: selling climax. B: building cause. C: spring (test). D: sign of strength (SOS). E: markup begins.',a:'wyckoffAccum'},
{h:'Wyckoff Distribution Schematic',d:'Phase A: buying climax. B: building cause. C: upthrust (UTAD). D: sign of weakness (SOW). E: markdown.',a:'wyckoffDist'},

/* ===== MODULE 16-17: OPTIONS & ALGO ===== */
{id:'m16',g:'Options & Algo (new)',t:'Options Trading & Volatility',b:'Calls, puts, Greeks, IV, strategies from basic to spreads.',
topics:[
{h:'Call & Put Options',d:'<b>Call</b>: right to BUY at strike. <b>Put</b>: right to SELL at strike. Buyer pays premium; seller collects it.',a:'callPut'},
{h:'Option Premium Components',d:'Premium = Intrinsic Value + Time Value. Intrinsic = how much ITM. Time = remaining expiry + volatility.',a:'premComp'},
{h:'Implied Volatility (IV)',d:'Market estimate of future movement priced into options. Higher IV = more expensive premium.',a:'iv'},
{h:'IV Rank & IV Percentile',d:'IV Rank: where is current IV vs past year. High IVR → sell premium. Low IVR → buy premium.',a:'ivRank'},
{h:'Delta',d:'How much option price changes per $1 move in underlying. Also approximates probability of expiring ITM.',a:'delta'},
{h:'Theta (Time Decay)',d:'Daily value lost from time passing. Accelerates near expiry. Sellers earn theta; buyers pay it.',a:'theta'},
{h:'Gamma',d:'Rate of change of delta. Highest ATM near expiry. Gamma risk = rapid delta shifts.',a:'gamma'},
{h:'Vega',d:'Sensitivity to IV change. Long options = long vega (benefit from IV rise). Short options = short vega.',a:'vega'},
{h:'Naked Short (Selling Premium)',d:'Selling calls/puts without hedge. Unlimited risk on calls. Premium is max profit. Requires high margin.',a:'nakedShort'},
{h:'Credit Spread',d:'Sell one option + buy further-out hedge. Capped risk = strike width - premium collected. Defined risk.',a:'creditSpread'},
{h:'Debit Spread',d:'Buy one option + sell further-out option to reduce cost. Capped profit but cheaper than outright buy.',a:'debitSpread'},
{h:'Iron Condor',d:'Sell both a call spread and put spread. Profit if price stays in range. Max profit = premium collected.',a:'ironCondor'},
{h:'Straddle & Strangle',d:'<b>Straddle</b>: buy call+put same strike. <b>Strangle</b>: different strikes. Profit from big move either direction.',a:'straddle'},
{h:'IV Crush',d:'IV drops sharply after anticipated event (earnings). Options lose value even if direction was right.',a:'ivCrush'}
],
quiz:[
{q:'Theta benefits:',o:['Option buyers','Option sellers (collecting time decay)','Neither','Both equally'],a:1,e:'Sellers collect theta daily; buyers lose it.'},
{q:'IV Crush happens:',o:['Before earnings','After earnings (IV drops sharply)','During weekends only','When IV is low'],a:1,e:'Anticipated event resolves → IV collapses.'},
{q:'Iron Condor profits when:',o:['Price moves a lot','Price stays within a range','Only if bullish','Only if bearish'],a:1,e:'Profit from range-bound movement.'},
{q:'Credit spread max loss:',o:['Unlimited','Strike width minus premium collected','Premium collected','Zero'],a:1,e:'Defined risk: strike difference - credit received.'}
]},

{id:'m17',g:'Options & Algo (new)',t:'Algorithmic Trading & Backtesting',b:'Strategy automation, backtesting methodology, overfitting, and walk-forward.',
topics:[
{h:'What is a Backtest',d:'Running exact rules against historical data. Only valuable if fills, slippage, and costs are realistic.',a:'backtest'},
{h:'Overfitting (Curve Fitting)',d:'Tuning parameters to match past noise. Looks great in-sample, fails live. Fewer parameters = less overfitting.',a:'overfit'},
{h:'Walk-Forward Validation',d:'Tune on period A, test frozen params on period B. Repeat rolling forward. Gold standard for robustness.',a:'walkForward'},
{h:'In-Sample vs Out-of-Sample',d:'IS = data used to develop/tune. OOS = data never seen during development. OOS performance = real indicator.',a:'isOos'},
{h:'Slippage & Transaction Costs',d:'Real fills are worse than backtest assumes. Add 1-2 ticks slippage + commissions to all simulated trades.',a:'slippage'},
{h:'Monte Carlo Simulation',d:'Randomize trade order thousands of times to see range of possible equity curves. Shows worst-case drawdown.',a:'monteCarlo'},
{h:'Sharpe & Sortino Ratios',d:'Sharpe = return/volatility. Sortino = return/downside volatility only. Higher = better risk-adjusted performance.',a:'sharpe'},
{h:'Strategy Decay & Regime Change',d:'Edges degrade over time as markets evolve. Regular re-validation needed. No strategy works forever.',a:'decay'}
],
quiz:[

{q:'Walk-forward testing:',o:['Uses same data for tuning and testing','Tunes on one period, tests unchanged on the next','Only tests recent data','Requires machine learning'],a:1,e:'Frozen params tested on unseen periods.'},
{q:'Monte Carlo simulation shows:',o:['Exact future returns','Range of possible outcomes from randomized trade order','Only one equity curve','Entry signals'],a:1,e:'Many randomized equity curves reveal worst-case scenarios.'},
{q:'Sharpe Ratio measures:',o:['Win rate','Risk-adjusted return (return / volatility)','Maximum drawdown','Number of trades'],a:1,e:'Higher Sharpe = better return per unit of risk.'}
]}

whatIsTrade(el){const{x,W,H}=mc(el,520,180);let f=0;setInterval(()=>{x.clearRect(0,0,W,H);x.font='11px IBM Plex Mono,monospace';
const price=100+Math.sin(f*.03)*20;const y=H/2-(price-100)*2;
x.strokeStyle='#34D6C4';x.lineWidth=2;x.beginPath();for(let i=0;i<Math.min(f,W);i++){const p=100+Math.sin((f-W+i)*.03)*20+Math.sin(i*.08)*5;x.lineTo(i,H/2-(p-100)*2);}x.stroke();
x.fillStyle='#F2B84B';x.beginPath();x.arc(Math.min(f,W-10),y,5,0,7);x.fill();
x.fillStyle='#8C97AC';x.fillText('Buy low',50,H-10);x.fillText('Sell high',350,10);
x.fillStyle=price>105?'#34D6C4':'#FF6B81';x.fillText('Price: '+price.toFixed(2),W-100,20);f++;},40);},

/* ===================== RENDER ENGINE ===================== */
function buildNav(){
  const nav=document.getElementById('navList'),map=document.getElementById('mapRow');nav.innerHTML='';map.innerHTML='';
  GRP.forEach(g=>{const mods=M.filter(m=>m.g===g);if(!mods.length)return;
  const gd=document.createElement('div');gd.className='ng';
  const gt=document.createElement('div');gt.className='ng-t';gt.textContent=g;gd.appendChild(gt);
  mods.forEach(m=>{
    const it=document.createElement('div');it.className='ni'+(S.cur===m.id?' active':'')+(S.done.has(m.id)?' done':'');it.id='n-'+m.id;
    it.innerHTML=`<span>${m.t}</span><span class="ck">${S.done.has(m.id)?'✓':''}</span>`;
    it.onclick=()=>goTo(m.id);gd.appendChild(it);
    const pill=document.createElement('span');pill.className='pill'+(g.includes('new')?' new':'');pill.textContent=m.t;pill.onclick=()=>goTo(m.id);map.appendChild(pill);
  });nav.appendChild(gd);});updPips();}

function updPips(){
  document.getElementById('pV').textContent=S.pts;
  document.getElementById('pB').style.width=Math.min(100,(S.done.size/M.length)*100)+'%';
  document.getElementById('pS').textContent=`${S.done.size} / ${M.length} modules completed`;}

function goTo(id){S.cur=id;document.querySelectorAll('.ni').forEach(e=>e.classList.remove('active'));
  const n=document.getElementById('n-'+id);if(n)n.classList.add('active');render(id);
  document.getElementById('workspace').scrollIntoView({behavior:'smooth',block:'start'});}

function render(id){
  const m=M.find(x=>x.id===id),p=document.getElementById('mp');if(!m)return;
  const isNew=m.g.includes('new');
  let h=`<div class="mk${isNew?' new':''}">${m.g}</div><h2 class="mt">${m.t}</h2><p class="mb">${m.b}</p>`;
  m.topics.forEach((t,ti)=>{
    h+=`<div class="tc"><h3>${t.h}</h3><p>${t.d}</p>`;
    if(t.a) h+=`<div class="as"><div class="at">${t.h}</div><div id="anim_${ti}"></div></div>`;
    h+=`</div>`;
  });
  h+=`<div class="qb"><h3>Quick Check</h3><div id="qWrap"></div><div class="qs" id="qScore" style="display:none"></div></div>`;
  const idx=M.findIndex(x=>x.id===id);const prev=M[idx-1],next=M[idx+1];
  h+=`<div class="mfn">${prev?`<button class="btn" onclick="goTo('${prev.id}')">&larr; ${prev.t}</button>`:'<span></span>'}${next?`<button class="btn primary" onclick="goTo('${next.id}')">${next.t} &rarr;</button>`:'<span></span>'}</div>`;
  p.innerHTML=h;
  // Run animations
  m.topics.forEach((t,ti)=>{if(t.a){const el=document.getElementById('anim_'+ti);if(el)runAnim(t.a,el,t.h);}});
  renderQuiz(m);}
/* ===================== QUIZ ENGINE ===================== */
function renderQuiz(m){
  const w=document.getElementById('qWrap');if(!m.quiz){w.innerHTML='<p style="color:var(--text-dim)">No quiz for this module yet.</p>';return;}
  let ans=0,sc=0;w.innerHTML='';
  m.quiz.forEach((q,qi)=>{
    const d=document.createElement('div');d.className='qq';
    d.innerHTML=`<div class="qt">${qi+1}. ${q.q}</div><div class="qo" id="qo${qi}"></div><div class="qe" id="qe${qi}">${q.e}</div>`;
    w.appendChild(d);const od=d.querySelector('.qo');
    q.o.forEach((opt,oi)=>{const b=document.createElement('button');b.className='qp';b.textContent=opt;
    b.onclick=()=>{if(b.dataset.lk)return;od.querySelectorAll('.qp').forEach(c=>{c.dataset.lk='1';c.disabled=true;});
    if(oi===q.a){b.classList.add('ok');sc++;S.pts+=10;}else{b.classList.add('no');od.children[q.a].classList.add('ok');}
    d.querySelector('.qe').classList.add('show');ans++;
    if(ans===m.quiz.length){S.done.add(m.id);buildNav();save();
    const sl=document.getElementById('qScore');sl.style.display='block';sl.textContent=`Score: ${sc}/${m.quiz.length} | +${sc*10} pips`;}};
    od.appendChild(b);});});}

/* ===================== TICKER ===================== */
function startTicker(){
  const cv=document.getElementById('ticker-canvas'),ctx=cv.getContext('2d');
  function resize(){cv.width=cv.clientWidth*devicePixelRatio;cv.height=cv.clientHeight*devicePixelRatio;}
  resize();window.addEventListener('resize',resize);
  let candles=[],lp=100;const cw=10*devicePixelRatio,g=5*devicePixelRatio;
  function mk(){const o=lp,d=(Math.random()-.48)*4,c=o+d;const h=Math.max(o,c)+Math.random()*2.5,l=Math.min(o,c)-Math.random()*2.5;lp=c;return{o,h,l,c};}
  for(let i=0;i<60;i++)candles.push(mk());let off=0;
  function draw(){const w=cv.width,ht=cv.height;ctx.clearRect(0,0,w,ht);
  const av=candles.flatMap(c=>[c.h,c.l]);const mx=Math.max(...av),mn=Math.min(...av);const sc=(ht*.75)/(mx-mn||1);const my=ht*.5;
  candles.forEach((c,i)=>{const px=w-(candles.length-i)*(cw+g)+off;
  const yO=my-(c.o-(mx+mn)/2)*sc,yC=my-(c.c-(mx+mn)/2)*sc,yH=my-(c.h-(mx+mn)/2)*sc,yL=my-(c.l-(mx+mn)/2)*sc;
  const bull=c.c>=c.o;ctx.strokeStyle=bull?'#34D6C4':'#FF6B81';ctx.fillStyle=bull?'#34D6C4':'#FF6B81';
  ctx.globalAlpha=.5;ctx.lineWidth=1.5*devicePixelRatio;
  ctx.beginPath();ctx.moveTo(px+cw/2,yH);ctx.lineTo(px+cw/2,yL);ctx.stroke();
  ctx.fillRect(px,Math.min(yO,yC),cw,Math.max(2,Math.abs(yC-yO)));ctx.globalAlpha=1;});}
  draw();
  if(!window.matchMedia('(prefers-reduced-motion:reduce)').matches){
  setInterval(()=>{off-=(cw+g);if(off<=-(cw+g)){off=0;candles.shift();candles.push(mk());}draw();},60);}}

/* ===================== INIT ===================== */
buildNav();startTicker();goTo('m1');
</script>
