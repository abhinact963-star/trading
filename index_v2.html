{h:'ICT Judas Swing — The Session Fake-Out',d:'At the open of a session (especially London), price often makes a <b>FALSE move in the opposite direction</b> of the true daily bias. This "Judas swing" sweeps liquidity from traders positioned for the real move, then reverses violently. It\'s manipulation 101: fake them out, take their stops, THEN go the real direction. If you get stopped out at the London open regularly, you\'re being Judas\'d.',a:'judaSwing'},
{h:'ICT Silver Bullet — The Precision Window',d:'Specific 1-hour windows where high-probability setups deliver: <b>10-11am ET</b> and <b>2-3pm ET</b>. Within these windows, look for price to deliver to a higher-timeframe FVG or order block. The Silver Bullet is for traders who want ONE clean trade per day at the highest probability time, rather than screen-watching for 8 hours.',a:'silverBullet'},
{h:'ICT Optimal Trade Entry (OTE)',d:'The <b>62-79% retracement zone</b> of an impulsive leg. After a displacement (strong move), price retraces. The OTE zone is where you ENTER for the continuation. It combines: Fibonacci golden pocket + likely order block location + the natural rhythm of institutional re-entry. It gives you the deepest entry with the best R:R while still being with the trend.',a:'ote'},
{h:'Wyckoff Accumulation — How Institutions Buy',d:'Institutions can\'t buy all at once (too much size). So they build positions in <b>a range that looks boring</b>. The schematic: <b>Phase A</b>: selling climax stops the prior downtrend. <b>Phase B</b>: range forms, building "cause." <b>Phase C</b>: SPRING — false breakdown that shakes out remaining sellers (the trap). <b>Phase D</b>: sign of strength (SOS) — rally above range. <b>Phase E</b>: markup begins.',a:'wyckoffAccum'},
{h:'Wyckoff Distribution — How Institutions Sell',d:'Mirror of accumulation at tops. Institutions unload into retail buying. <b>Phase A</b>: buying climax. <b>Phase B</b>: range at top. <b>Phase C</b>: UTAD (upthrust after distribution) — false breakout above range that traps late buyers. <b>Phase D</b>: sign of weakness (SOW). <b>Phase E</b>: markdown. Retail is still "buying the dip" while institutions are gone.',a:'wyckoffDist'},
{h:'The Spring & Upthrust — The Trap Events',d:'<b>Spring</b>: in accumulation, price briefly breaks BELOW the range. Retail thinks "breakdown!" and sells. But it\'s a TRAP — institutions are buying all those panic sells. Price immediately rallies back inside. <b>Upthrust</b>: same thing at distribution tops — false breakout above traps late buyers, then collapses. These are the highest-probability entries in Wyckoff.',a:'springUpthrust'},
{h:'Elliott Wave — 5-3 Impulse-Correction',d:'Markets move in <b>5-wave impulses</b> (Waves 1,2,3,4,5) followed by <b>3-wave corrections</b> (A,B,C). Waves 1,3,5 move WITH the trend. Waves 2,4 are pullbacks. Wave 3 is usually the longest and strongest (the "sweet spot"). Wave 5 is the final push (often weakest, with divergence). Then the correction (A-B-C) retraces a portion of the entire impulse.',a:'elliott'},
{h:'Elliott Wave Rules — The Three Laws',d:'<b>Rule 1:</b> Wave 2 NEVER retraces 100% of Wave 1. (If it does, your count is wrong.) <b>Rule 2:</b> Wave 3 is NEVER the shortest of waves 1, 3, and 5. (It\'s usually the longest.) <b>Rule 3:</b> Wave 4 does NOT overlap with Wave 1\'s territory. (In an uptrend, wave 4\'s low stays above wave 1\'s high.) Break any rule = invalid count, start over.',a:'elliottRules'},
{h:'Fibonacci + Elliott Wave',d:'The two frameworks combine naturally: <b>Wave 2</b> often retraces 61.8% of wave 1 (golden pocket). <b>Wave 3</b> often extends to 161.8% of wave 1. <b>Wave 4</b> typically retraces 38.2% of wave 3. <b>Wave 5</b> often equals wave 1 in length or extends to 61.8% of waves 1-3 combined. These give you precise TARGETS for each wave.',a:'fibElliott'},
{h:'The Honest Caveat About All Three Frameworks',d:'ICT, Wyckoff, and Elliott all have VALUE but also LIMITATIONS. ICT concepts are hard to validate statistically. Wyckoff schematics are easier to identify in hindsight than in real-time. Elliott Wave counting is subjective — two analysts often get different counts. Use them as <b>frameworks to think with</b>, not as certainties. Combine with your own price action reading.',a:null}
],
quiz:[
{q:'ICT Kill Zones are:',o:['Random times of day','Specific session windows with highest institutional activity','Only for crypto','Weekends'],a:1,e:'London/NY opens = when real money moves markets.'},
{q:'Wyckoff Spring is:',o:['False breakdown below accumulation that TRAPS sellers','A genuine breakdown','A bullish candle pattern','A volume indicator'],a:0,e:'Spring = trap below range → institutions buying the panic.'},
{q:'Elliott Wave 3 is:',o:['Always the shortest','NEVER the shortest (usually the longest/strongest)','Always exactly equal to wave 1','Optional'],a:1,e:'Rule: Wave 3 cannot be the shortest impulse wave.'},
{q:'ICT OTE zone is:',o:['0-23% retracement','50-61%','62-79% retracement (golden pocket area)','100% retracement'],a:2,e:'OTE sits in the golden pocket = deep entry with best R:R.'}
]},

/* ===== MODULE 16: OPTIONS TRADING ===== */
{id:'m16',g:'Options & Algo (new)',t:'Options Trading & Volatility',b:'Options add a dimension beyond direction — time and volatility. This module covers the Greeks, IV, and strategies from basic to defined-risk spreads.',
topics:[
{h:'What is an Option?',d:'An option gives you the <b>RIGHT (not obligation) to buy or sell</b> at a specific price (strike) by a specific date (expiry). You PAY for this right (premium). If you\'re wrong, you lose the premium. If you\'re right, the profit can be multiples of what you paid. Think of it as "renting" exposure to price movement.',a:'callPut'},
{h:'Calls and Puts',d:'<b>Call option</b>: right to BUY at strike price. You buy calls when you\'re bullish. <b>Put option</b>: right to SELL at strike price. You buy puts when you\'re bearish. Buyer\'s max loss = premium paid. Seller (writer) collects premium but takes on obligation.',a:'callPut'},
{h:'Intrinsic Value + Time Value = Premium',d:'Option premium has two parts: <b>Intrinsic</b> = how much it\'s already "in the money" (if at all). <b>Time value</b> = extra value from remaining time + volatility. A call with strike 100 when stock is at 105: intrinsic = $5, time value = whatever extra premium exists. At expiry, time value = 0; only intrinsic remains.',a:'premComp'},
{h:'Implied Volatility (IV) — The Price of Uncertainty',d:'IV is the market\'s <b>forecast of how much the underlying will move</b> between now and expiry, baked into option prices. Higher IV = more expensive options. IV rises before uncertain events (earnings, elections) and DROPS after (IV crush). IV is not direction — it\'s the MAGNITUDE of expected movement.',a:'iv'},
{h:'IV Rank & IV Percentile — Is IV High or Low?',d:'<b>IV Rank</b>: where current IV sits relative to its past year range (0-100%). IVR of 80 = IV is near its yearly high. <b>Strategy</b>: High IVR → options are expensive → SELL premium (collect that inflated price). Low IVR → options are cheap → BUY premium (buy cheap insurance/leverage).',a:'ivRank'},
{h:'Delta — Direction Sensitivity',d:'How much the option price changes per $1 move in the underlying. A 0.50 delta call gains $0.50 for every $1 the stock rises. Delta also <b>approximates probability of expiring ITM</b> (0.30 delta ≈ 30% chance). ATM options ≈ 0.50 delta. OTM = lower delta. ITM = higher delta.',a:'delta'},
{h:'Theta — Time Decay (The Silent Killer for Buyers)',d:'Every day that passes, an option loses value — this is theta. <b>Theta accelerates near expiry</b> (exponential decay in the last 30 days). Option SELLERS earn theta every day (their position gains value from decay). Buyers LOSE theta daily. This is why buying OTM options with far-away strikes often loses — theta eats you alive.',a:'theta'},
{h:'Gamma — Delta\'s Accelerator',d:'How fast delta changes per $1 move. Gamma is highest for ATM options near expiry. High gamma = your delta shifts rapidly, which means your position can gain or lose MUCH faster. <b>Gamma risk</b>: near-expiry ATM options have extreme gamma, making P&L unpredictable. Long gamma = you benefit from big moves. Short gamma = big moves hurt you.',a:'gamma'},
{h:'Vega — Volatility Sensitivity',d:'How much option price changes per 1% change in IV. Long options = <b>positive vega</b> (benefit when IV rises). Short options = negative vega (benefit when IV drops). This is why buying options before earnings (high IV) and holding through = dangerous. Even if direction is right, the IV drop (crush) can kill your profit.',a:'vega'},
{h:'Selling Premium (Naked) — High Win Rate, Tail Risk',d:'Selling puts or calls collects premium upfront. Profitable if price stays away from strike. <b>Win rate is high (65-80%)</b> but max loss can be HUGE (unlimited on naked calls). It\'s like selling insurance — steady income until the rare disaster. Requires large account and strict risk management.',a:'nakedShort'},
{h:'Credit Spread — Defined Risk Selling',d:'Sell one option + buy a further-out option as a hedge. <b>Max profit = premium collected</b>. <b>Max loss = width between strikes minus premium</b>. Example: sell 100 put, buy 95 put. Width = $5. If you collected $1.50 premium: max loss = $5 - $1.50 = $3.50. Risk is DEFINED and capped.',a:'creditSpread'},
{h:'Iron Condor — Profit From Range',d:'Sell both a call spread AND a put spread around current price. You profit if price stays BETWEEN your short strikes until expiry. Max profit = total premium collected from both sides. Works best in high IV (collect more premium) and ranging markets. The trade: "I don\'t think price will move THIS much."',a:'ironCondor'},
{h:'IV Crush — The Earnings Trap',d:'Before earnings, IV inflates because the event is uncertain. Options become expensive. After earnings, uncertainty resolves → IV drops 30-50% overnight. This is <b>IV crush</b>. Buying options before earnings is a LOSING game unless the move exceeds what IV already priced in. Most of the time, the move is SMALLER than IV priced — sellers win.',a:'ivCrush'}
],
quiz:[
{q:'Theta benefits:',o:['Option buyers (they gain value over time)','Option SELLERS (they collect time decay daily)','Neither — theta is neutral','Both equally'],a:1,e:'Sellers earn theta; buyers hemorrhage it.'},
{q:'IV Crush happens:',o:['Before an event (IV builds)','AFTER an event resolves (IV collapses rapidly)','During weekends only','When IV is already low'],a:1,e:'Uncertainty resolved → IV drops → option values crater.'},
{q:'Iron Condor profits when:',o:['Price makes a big move','Price STAYS within a defined range until expiry','Only in a bull market','Only in a bear market'],a:1,e:'Range-bound = both spreads expire worthless = keep all premium.'},
{q:'Credit spread max loss is:',o:['Unlimited','Strike width minus premium collected (DEFINED)','Only the premium paid','Zero'],a:1,e:'Hedge caps the loss at strike difference minus credit received.'}
]},

{id:'m17',g:'Options & Algo (new)',t:'Algorithmic Trading & Backtesting',b:'Converting a trading idea into rules a computer can test. The critical skill: knowing when your backtest is lying to you.',
topics:[
{h:'What is Algorithmic Trading?',d:'Converting your trading rules into <b>code that executes automatically</b>. Benefits: removes emotion, tests ideas on decades of data, executes faster than humans. Risk: if the rules are wrong or overfit, you automate LOSSES. The algo is only as good as the human who designed and validated it.',a:'backtest'},
{h:'What a Backtest Actually Shows',d:'A backtest runs your exact entry/exit rules against historical price data. It shows: <b>what WOULD have happened</b> if you\'d traded those rules in the past. It does NOT guarantee future performance. It\'s a necessary but not sufficient test — think of it as: "If this edge existed, the backtest shows it. If the backtest fails, the edge doesn\'t exist."',a:'backtest'},
{h:'Overfitting — The #1 Backtest Lie',d:'If you have 10 adjustable parameters and 50 historical trades, you can ALWAYS find parameter combinations that look profitable in hindsight. This is <b>curve fitting</b> — you\'ve matched the noise, not the signal. The strategy looks amazing on past data but fails immediately live because it memorized the past rather than finding a generalizable pattern.',a:'overfit'},
{h:'How to Detect Overfitting',d:'Red flags: <b>1.</b> Strategy has many parameters relative to trade count. <b>2.</b> Small changes in parameters cause dramatically different results. <b>3.</b> Backtest equity curve is "too perfect" (suspiciously smooth). <b>4.</b> Strategy only works on one specific instrument/timeframe. <b>5.</b> In-sample performance is spectacularly better than out-of-sample.',a:null},
{h:'Walk-Forward Validation — The Gold Standard',d:'<b>Step 1:</b> Optimize parameters on Period A (in-sample). <b>Step 2:</b> FREEZE those parameters. <b>Step 3:</b> Test on Period B (out-of-sample, never seen during optimization). <b>Step 4:</b> Roll forward — repeat with new in-sample/out-of-sample windows. If out-of-sample performance is consistently positive across many windows, the edge is likely REAL.',a:'walkForward'},
{h:'In-Sample vs Out-of-Sample',d:'<b>In-sample (IS)</b> = data used to develop/tune the strategy. <b>Out-of-sample (OOS)</b> = data NEVER seen during development. OOS performance is the TRUE test. If IS shows 80% returns but OOS shows 5%, you\'ve overfit. A robust strategy shows SIMILAR (though slightly lower) performance on OOS vs IS.',a:'isOos'},
{h:'Slippage & Transaction Costs — Reality Check',d:'Backtests assume you get filled at the EXACT price you wanted. Reality: you get slipped (worse fill). Add <b>1-2 ticks of slippage per trade</b> + commissions to your backtest. A strategy that shows 5% annual return before costs might show -2% after realistic friction. If the edge disappears with realistic costs, it\'s not a real edge.',a:'slippage'},
{h:'Monte Carlo Simulation — Stress Testing',d:'Take your backtest results and <b>randomize the order of trades</b> thousands of times. This shows you the RANGE of possible equity curves — not just the one historical path. It reveals: worst-case drawdown (Murphy\'s Law scenario), probability of ruin, and confidence intervals for returns. If 20% of randomized paths blow up your account, the strategy is too fragile.',a:'monteCarlo'},
{h:'Sharpe & Sortino Ratios — Quality of Returns',d:'<b>Sharpe Ratio</b> = (Annual Return - Risk-Free Rate) / Annual Volatility. Sharpe > 1.0 = decent. > 2.0 = excellent. <b>Sortino Ratio</b> = same but only uses DOWNSIDE volatility (more relevant since upside volatility is good). These tell you if returns are EARNED through skill or just through taking massive risk.',a:'sharpe'},
{h:'Strategy Decay — Nothing Lasts Forever',d:'Markets evolve. Participants change. Regulations shift. An edge that worked 2015-2020 may not work 2024-2029. <b>Every strategy decays over time.</b> You need: continuous monitoring, periodic re-validation, and the willingness to retire strategies that stop working. The best algo traders are always developing the NEXT strategy while running the current one.',a:'decay'},
{h:'The Algo Trader\'s Checklist',d:'Before going live: <b>1.</b> Strategy has clear, logical rationale (not just data-mined). <b>2.</b> Passes walk-forward on multiple windows. <b>3.</b> Survives Monte Carlo (no ruin in 95% of paths). <b>4.</b> Works on multiple instruments/timeframes (generalizability). <b>5.</b> Still profitable after 2x realistic slippage. <b>6.</b> Sharpe > 1.0 out-of-sample. <b>7.</b> You understand WHY it works, not just THAT it works.',a:null}
],
quiz:[
{q:'Overfitting means:',o:['Using too little data','Parameters tuned to NOISE rather than signal (won\'t generalize)','Having zero parameters','Running too many backtests'],a:1,e:'Memorizing past noise ≠ finding a real edge.'},
{q:'Walk-forward validation:',o:['Uses same data for tuning and testing','Tunes on one period, tests UNCHANGED parameters on a separate later period','Only tests the most recent week','Requires deep learning'],a:1,e:'Frozen params on unseen data = the real test of robustness.'},
{q:'Monte Carlo simulation shows:',o:['Exact future returns','RANGE of possible outcomes from randomized trade order (worst-case scenarios)','A single perfect equity curve','Which trades to take'],a:1,e:'Many randomized paths reveal the distribution of possible outcomes.'},
{q:'Sharpe Ratio > 2.0 means:',o:['The strategy will never lose','Returns are excellent relative to risk taken','It\'s overfit','It needs more parameters'],a:1,e:'Sharpe > 2.0 = high-quality risk-adjusted returns.'}
]}
]; /* END MODULES ARRAY */

x.fillStyle='#F2B84B';x.beginPath();x.arc(Math.min(f,W-10),y,5,0,7);x.fill();
x.fillStyle='#8C97AC';x.fillText('Buy low',50,H-10);x.fillText('Sell high',350,10);
x.fillStyle=price>105?'#34D6C4':'#FF6B81';x.fillText('Price: '+price.toFixed(2),W-100,20);f++;},40);},

x.fillStyle='#8C97AC';x.fillText('BIDS',120,10);x.fillText('ASKS',400,10);x.strokeStyle='#232C3D';x.beginPath();x.moveTo(260,0);x.lineTo(260,H);x.stroke();

x.fillStyle='#F2B84B';x.strokeStyle='#F2B84B';x.setLineDash([3,3]);x.beginPath();x.moveTo(300,mid+40);x.lineTo(450,mid+40);x.stroke();x.setLineDash([]);

f++;},60);},

leverage(el){const{x,W,H}=mc(el,520,180);let f=0;setInterval(()=>{x.clearRect(0,0,W,H);const move=Math.sin(f*.04)*5;
const levs=[1,2,5,10];const bw=70,gap=20,sx=60;x.font='11px IBM Plex Mono,monospace';
x.fillStyle='#8C97AC';x.fillText('Underlying move: '+(move>0?'+':'')+move.toFixed(1)+'%',10,14);
x.strokeStyle='#232C3D';x.beginPath();x.moveTo(0,H/2);x.lineTo(W,H/2);x.stroke();
levs.forEach((l,i)=>{const pnl=move*l;const bH=Math.abs(pnl)*3;const yy=pnl>=0?H/2-bH:H/2;
x.fillStyle=pnl>=0?'rgba(52,214,196,.5)':'rgba(255,107,129,.5)';x.fillRect(sx+i*(bw+gap),yy,bw,bH);
x.fillStyle='#E7EAF0';x.fillText(l+'x',sx+i*(bw+gap)+28,H-8);
x.fillStyle=pnl>=0?'#34D6C4':'#FF6B81';x.fillText((pnl>0?'+':'')+pnl.toFixed(1)+'%',sx+i*(bw+gap)+15,pnl>=0?yy-6:yy+bH+14);});
f++;},50);},

f++;},50);},

sessions(el){const{x,W,H}=mc(el,520,140);x.clearRect(0,0,W,H);x.font='10px IBM Plex Mono,monospace';
const sessions=[{n:'Asian',s:0,e:30,c:'rgba(140,151,172,.2)',tc:'#8C97AC'},{n:'London',s:30,e:65,c:'rgba(52,214,196,.2)',tc:'#34D6C4'},{n:'Overlap',s:55,e:75,c:'rgba(242,184,75,.2)',tc:'#F2B84B'},{n:'New York',s:65,e:100,c:'rgba(255,107,129,.2)',tc:'#FF6B81'}];
sessions.forEach(s=>{const sx=s.s/100*W,sw=(s.e-s.s)/100*W;x.fillStyle=s.c;x.fillRect(sx,30,sw,80);x.fillStyle=s.tc;x.fillText(s.n,sx+sw/2-20,24);});

x.lineTo(i,H-20-vol);}x.stroke();

    if(t.a){
      if(GIFS[t.a]){
        h+=`<div class="as"><div class="at">${t.h}</div><img src="img/${GIFS[t.a]}" alt="${t.h}" loading="lazy" style="width:100%;max-width:540px;border-radius:6px;display:block;"></div>`;
      } else {
        h+=`<div class="as"><div class="at">${t.h}</div><div id="anim_${ti}"></div></div>`;
      }
    }
    h+=`</div>`;
  });
  h+=`<div class="qb"><h3>Quick Check</h3><div id="qWrap"></div><div class="qs" id="qScore" style="display:none"></div></div>`;
  const idx=M.findIndex(x=>x.id===id);const prev=M[idx-1],next=M[idx+1];
  h+=`<div class="mfn">${prev?`<button class="btn" onclick="goTo('${prev.id}')">&larr; ${prev.t}</button>`:'<span></span>'}${next?`<button class="btn primary" onclick="goTo('${next.id}')">${next.t} &rarr;</button>`:'<span></span>'}</div>`;
  p.innerHTML=h;
  // Run animations
  m.topics.forEach((t,ti)=>{if(t.a){const el=document.getElementById('anim_'+ti);if(el)runAnim(t.a,el,t.h);}});
  renderQuiz(m);}
/* ===================== QUIZ ENGINE ===================== */
function renderQuiz(m){
  const w=document.getElementById('qWrap');if(!m.quiz){w.innerHTML='<p style="color:var(--text-dim)">No quiz for this module yet.</p>';return;}
  let ans=0,sc=0;w.innerHTML='';
  m.quiz.forEach((q,qi)=>{
    const d=document.createElement('div');d.className='qq';
    d.innerHTML=`<div class="qt">${qi+1}. ${q.q}</div><div class="qo" id="qo${qi}"></div><div class="qe" id="qe${qi}">${q.e}</div>`;
    w.appendChild(d);const od=d.querySelector('.qo');
    // Shuffle options while tracking correct answer
    const indices=[...Array(q.o.length).keys()];
    for(let i=indices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[indices[i],indices[j]]=[indices[j],indices[i]];}
    const correctIdx=indices.indexOf(q.a);
    indices.forEach((origIdx)=>{const b=document.createElement('button');b.className='qp';b.textContent=q.o[origIdx];
    b.onclick=()=>{if(b.dataset.lk)return;od.querySelectorAll('.qp').forEach(c=>{c.dataset.lk='1';c.disabled=true;});
    if(origIdx===q.a){b.classList.add('ok');sc++;S.pts+=10;}else{b.classList.add('no');od.children[correctIdx].classList.add('ok');}
    d.querySelector('.qe').classList.add('show');ans++;
    if(ans===m.quiz.length){S.done.add(m.id);buildNav();save();
    const sl=document.getElementById('qScore');sl.style.display='block';sl.textContent=`Score: ${sc}/${m.quiz.length} | +${sc*10} pips`;}};
    od.appendChild(b);});});}

/* ===================== TICKER ===================== */
function startTicker(){
  const cv=document.getElementById('ticker-canvas'),ctx=cv.getContext('2d');
  function resize(){cv.width=cv.clientWidth*devicePixelRatio;cv.height=cv.clientHeight*devicePixelRatio;}
  resize();window.addEventListener('resize',resize);
  let candles=[],lp=100;const cw=10*devicePixelRatio,g=5*devicePixelRatio;
  function mk(){const o=lp,d=(Math.random()-.48)*4,c=o+d;const h=Math.max(o,c)+Math.random()*2.5,l=Math.min(o,c)-Math.random()*2.5;lp=c;return{o,h,l,c};}
  for(let i=0;i<60;i++)candles.push(mk());let off=0;
  function draw(){const w=cv.width,ht=cv.height;ctx.clearRect(0,0,w,ht);
  const av=candles.flatMap(c=>[c.h,c.l]);const mx=Math.max(...av),mn=Math.min(...av);const sc=(ht*.75)/(mx-mn||1);const my=ht*.5;
  candles.forEach((c,i)=>{const px=w-(candles.length-i)*(cw+g)+off;
  const yO=my-(c.o-(mx+mn)/2)*sc,yC=my-(c.c-(mx+mn)/2)*sc,yH=my-(c.h-(mx+mn)/2)*sc,yL=my-(c.l-(mx+mn)/2)*sc;
  const bull=c.c>=c.o;ctx.strokeStyle=bull?'#34D6C4':'#FF6B81';ctx.fillStyle=bull?'#34D6C4':'#FF6B81';
  ctx.globalAlpha=.5;ctx.lineWidth=1.5*devicePixelRatio;
  ctx.beginPath();ctx.moveTo(px+cw/2,yH);ctx.lineTo(px+cw/2,yL);ctx.stroke();
  ctx.fillRect(px,Math.min(yO,yC),cw,Math.max(2,Math.abs(yC-yO)));ctx.globalAlpha=1;});}
  draw();
  if(!window.matchMedia('(prefers-reduced-motion:reduce)').matches){
  setInterval(()=>{off-=(cw+g);if(off<=-(cw+g)){off=0;candles.shift();candles.push(mk());}draw();},60);}}

/* ===================== INIT ===================== */
buildNav();startTicker();goTo('m1');
</script>
